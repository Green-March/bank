plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "plan_20260226_001_r2"
  request_id: "req_20260226_001"
  revision: 2
  timestamp: "2026-02-26T09:15:00+09:00"
  revision_notes: "Reviewer指摘5件+修正要求2件を反映。期間方針明記、ゲート条件追加、連結/非連結監査追加、J-Quants例外フロー定義、整合レポート必須化。"

  objective: "2780 コメ兵ホールディングスのフルパイプライン実行。7685で確立したパイプライン（収集→解析→統合→メトリクス→レポート）を適用し、汎用性を検証する。"
  ticker: "2780"
  output_format: ["md", "html"]

  # === 期間方針（Reviewer指摘#5対応）===
  timeframe_policy:
    scope: "5年（FY2021〜FY2025）を主要分析期間とする"
    rationale: "req_20260226_001のtimeframe指定が5y。コメ兵HDは2021年10月にホールディングス体制へ移行しており、連結財務の一貫性が担保される期間。"
    raw_data_range: "EDINET保有分全期間（2019〜2025）をパースし保持するが、レポート・メトリクスの主要比較対象はFY2021-FY2025の5年間"
    pre_2021_handling: "FY2019-FY2020のデータはinventory.mdに記載するが、メトリクス比較表・レポート本文では参考値として注記付きで掲載（HD体制移行前のため直接比較不適）"

  current_data_state:
    raw_edinet: "12 ZIPファイル（XBRL）+ 日次documents JSON + 10 PDF（有価証券報告書 2016-2025）"
    raw_jquants: "2ファイル（statements_2026-02-15.json, statements_2026-02-17.json）"
    parsed: "financials.json（12文書）, metrics.json（7件, company_name='Unknown'）, jquants_fins_statements.json（10レコード）"
    missing: "integrated_financials.json, reports/, inventory.md"
    known_issues:
      - id: "ISSUE-001"
        description: "metrics_series 7件 vs financials.json 12文書の乖離"
        gate_condition: "T1完了時に原因を特定し、T3開始前ゲートとして乖離理由を文書化すること。理由が不明な場合はT3に進まずSeniorに報告。"
      - id: "ISSUE-002"
        description: "metrics.json の company_name が 'Unknown'"
        gate_condition: "T3のメトリクス再計算で解消されること。解消しない場合はparser調査タスクを追加。"

  task_decomposition:
    - task_id: "T1_edinet_parse"
      assigned_to: junior1
      phase: 1
      parallel: true
      description: "EDINET XBRL再解析 + 連結/非連結監査 + データインベントリ作成"
      steps:
        - "既存 raw/edinet/ の12 ZIPファイルの期間・文書種別（有価証券報告書/四半期報告書/半期報告書）を一覧化"
        - "各文書の連結(consolidated)/非連結(standalone)ステータスを確認し、文書種別×連結区分マトリクスを作成"
        - "python3 skills/disclosure-parser/scripts/main.py --ticker 2780 を実行し financials.json を再生成"
        - "解析結果検証: 12文書すべてが正常に解析されているか確認。ISSUE-001の原因（12文書 vs metrics 7件の乖離理由）を特定し文書化"
        - "data/2780/inventory.md を作成（7685の inventory.md に準拠: 文書ID、期間、文書種別、連結/非連結、カバレッジマトリクス）"
      deliverables:
        - "data/2780/parsed/financials.json（更新）"
        - "data/2780/inventory.md（新規: 文書種別×連結区分マトリクス含む）"
      quality_criteria:
        - "12文書すべてが financials.json に含まれること"
        - "各文書の period_end, fiscal_year, statement_type（consolidated/standalone）が正しいこと"
        - "BS/PL/CFの主要項目がnull以外で取得できる文書が過半数あること"
        - "ISSUE-001の原因が特定・文書化されていること（T3開始ゲート条件）"
        - "連結/非連結の識別が全文書で明示されていること"

    - task_id: "T2_jquants_integrate"
      assigned_to: junior2
      phase: 1
      parallel: true
      description: "J-Quants データ刷新 + 連結/非連結監査 + EDINET統合 + 整合レポート出力"
      steps:
        - "python3 skills/disclosure-collector/scripts/main.py jquants 2780 でJ-Quantsデータを最新化"
        - "J-Quants更新失敗時の例外処理（下記exception_flow参照）"
        - "jquants_fins_statements.json の内容を検証（レコード数、期間カバレッジ、連結/非連結識別）"
        - "T1完了後: financials.json の連結/非連結識別とJ-Quantsの連結/非連結を照合し、文書種別差分を監査"
        - "financials.json と jquants_fins_statements.json を統合し integrated_financials.json を生成（period_endキーでマッチング）"
        - "整合レポート出力: period_end × source（edinet/jquants/both） × statement_type（consolidated/standalone）のクロス表を integrated_financials.json 内の coverage_matrix として含める"
      deliverables:
        - "data/2780/raw/jquants/statements_2026-02-26.json（新規）"
        - "data/2780/parsed/jquants_fins_statements.json（更新）"
        - "data/2780/parsed/integrated_financials.json（新規: coverage_matrix含む）"
      quality_criteria:
        - "J-Quantsの最新データが取得できていること（例外フロー適用時はその旨記録）"
        - "integrated_financials.json にcoverage_matrix（period_end×source×statement_type）が含まれること"
        - "連結/非連結の不一致がある場合、その期間と理由が文書化されていること"
        - "カバレッジマトリクスで各期間のデータソースが明記されていること"
      dependency: "統合ステップはT1完了後に実行"
      exception_flow:
        trigger: "J-Quants API更新失敗（認証切れ、APIエラー、タイムアウト）"
        retry_policy:
          max_retries: 2
          retry_interval: "auth.pyの自動トークン更新を試行後、再実行"
        on_auth_failure: "JQUANTS_EMAIL/PASSWORD による自動リフレッシュを試行。それでも失敗した場合は停止しSeniorに報告。"
        on_max_retries_exceeded: "既存データ（statements_2026-02-17.json）をフォールバックとして使用し、integrated_financials.json の metadata に 'jquants_data_stale: true, last_successful_fetch: 2026-02-17' を記録。レポートに注記を追加。この場合でもT3は実行可能とするが、Seniorは完了報告時にManagerに通知する。"
        on_partial_failure: "取得できたレコードのみで処理を継続し、欠損期間をcoverage_matrixに明記。"

    - task_id: "T3_metrics_report"
      assigned_to: junior3
      phase: 2
      parallel: false
      description: "メトリクス再計算 + レポート生成 + QA"
      gate_conditions:
        - "T1完了: financials.json更新済み + ISSUE-001原因文書化済み"
        - "T2完了: integrated_financials.json生成済み + coverage_matrix含む"
        - "gate未達の場合はT3を開始せず、Seniorに報告"
      steps:
        - "T1のISSUE-001原因文書を確認し、12文書→メトリクス変換の期待件数を確定"
        - "python3 skills/financial-calculator/scripts/main.py calculate --ticker 2780 でメトリクス再計算（integrated_financials.jsonを入力）"
        - "metrics.json検証: company_nameが'コメ兵ホールディングス'であること、metrics_seriesの件数がcoverage_matrixと整合すること"
        - "mkdir -p data/2780/reports && python3 skills/financial-reporter/scripts/main.py --ticker 2780 でレポート生成"
        - "レポート検証: Executive Summary, Time Series（FY2021-FY2025主要5年）, Quarterly Progression, Data Sources, Assumptions & Risk Notes"
        - "FY2019-FY2020データは参考値として注記付きで掲載（HD体制移行前）"
      deliverables:
        - "data/2780/parsed/metrics.json（更新、company_name修正済み）"
        - "data/2780/reports/2780_report.md（新規）"
        - "data/2780/reports/2780_report.html（新規）"
      quality_criteria:
        - "company_name が 'コメ兵ホールディングス' であること"
        - "ROE, ROA, Operating Margin, Revenue Growth, FCF が主要5年分計算されていること"
        - "metrics_series件数とintegrated_financials.jsonの期間数が整合すること"
        - "レポートにデータソース（EDINET文書ID + J-Quants）が明記されていること"
        - "前提（期間方針、連結/非連結判定、HD移行）とリスクが明示されていること"
        - "FY2019-FY2020が参考値注記付きであること"

  execution_plan:
    phase_1:
      description: "データ準備（並列実行）"
      tasks: ["T1_edinet_parse (Junior 1)", "T2_jquants_integrate (Junior 2, 統合ステップはT1完了待ち)"]
    phase_2:
      description: "メトリクス計算 + レポート生成（T1+T2完了後）"
      tasks: ["T3_metrics_report (Junior 3)"]
      gate: "T1のISSUE-001文書化 + T2のintegrated_financials.json生成 が両方完了していること"
    phase_3:
      description: "統合レビュー + 完了報告"
      tasks: ["Senior: 成果物レビュー中継 → dashboard更新 → Manager完了報告"]

  risk_assessment:
    - risk: "EDINET APIレート制限"
      mitigation: "既存rawデータを活用、再収集は不要（パース再実行のみ）"
    - risk: "J-Quantsトークン期限切れ"
      mitigation: "auth.pyの自動更新 → 失敗時は既存データフォールバック（exception_flow参照）"
    - risk: "company_name 'Unknown'問題"
      mitigation: "T1のparser再実行で解消見込み。解消しない場合はparser調査タスクを追加。"
    - risk: "連結/非連結の不一致"
      mitigation: "T1+T2で監査マトリクスを作成し、T3実行前にゲート判定。"
    - risk: "HD体制移行（2021年10月）前後のデータ一貫性"
      mitigation: "FY2019-2020を参考値扱いとし、主要比較はFY2021-2025の5年間に限定。"
