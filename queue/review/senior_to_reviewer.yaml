plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "plan_req025_9743_full_pipeline"
  request_id: "req_20260225_025"
  timestamp: "2026-02-25T19:00:00+09:00"
  objective: "9743 丹青社のフルパイプライン実行 — pipeline-runner の example_pipeline.yaml (7ステップ) を --vars ticker=9743 のみで一括実行し、汎用性を検証する"
  background: |
    pipeline-runner は過去に 2780, 7685 で実行済み。今回は 9743（丹青社）を対象に、
    resolve → collect → parse → integrate → calculate → inventory → report の
    7ステップパイプラインを実行し、新しい銘柄でも --vars ticker=XXXX のみで
    全パイプラインが自動完走することを検証する。
    fye_month は resolve ステップの output_vars から自動供給されることも確認ポイント。
  task_decomposition:
    - task_id: "T1_pipeline_execution"
      assignee: "junior1"
      description: |
        9743 丹青社のフルパイプライン実行と検証:
        1. pipeline-runner で example_pipeline.yaml を実行
           コマンド: python3 skills/pipeline-runner/scripts/main.py run \
             --pipeline skills/pipeline-runner/references/example_pipeline.yaml \
             --vars ticker=9743 \
             --log data/9743/logs/pipeline_run.json
        2. 検証項目:
           - --vars ticker=9743 のみで全7ステップが完走するか
           - resolve ステップの output_vars (fye_month, edinet_code, company_name) が後続ステップに正しく伝搬されるか
           - 各ステップの成果物が data/9743/ 配下に正しく生成されるか
        3. 成果物ドキュメント作成:
           - 利用データソース一覧（EDINET, J-Quants 等）
           - 前提条件とリスクの明示
           - パイプライン実行ログの確認と要約
      output_path: "data/9743/"
      priority: "high"
    - task_id: "T2_comparison_report"
      assignee: "junior2"
      depends_on: ["T1_pipeline_execution"]
      description: |
        9743 の実行結果と過去2銘柄 (2780, 7685) の比較分析:
        1. data/9743/reports/ の最終レポートを確認
        2. 過去のパイプライン実行結果 (data/2780/, data/7685/) と比較
        3. 記録事項:
           - パイプライン動作の違い（エラー、スキップ、データ不足等）
           - 財務指標の特徴的な差異
           - pipeline-runner 汎用性に関する新たな知見
        4. 比較レポートを data/9743/reports/comparison_notes.md に出力
      output_path: "data/9743/reports/comparison_notes.md"
      priority: "medium"
  quality_criteria:
    - "パイプライン全7ステップが status: completed で完走すること"
    - "output_vars (fye_month, edinet_code, company_name) が正しく伝搬されていること"
    - "--vars ticker=9743 のみで実行可能（追加の手動変数指定不要）であること"
    - "data/9743/ 配下に成果物（resolved, raw, parsed, integrated, reports）が生成されること"
    - "利用データソース・前提・リスクが明記されていること"
    - "過去2銘柄との比較分析が記録されていること"
  risk_assessment:
    - risk: "9743 が EDINET に登録されていない、またはキャッシュに存在しない可能性"
      mitigation: "resolve ステップで失敗した場合、ticker-resolver のキャッシュ更新 (update --force) を実施"
    - risk: "EDINET API や J-Quants API のレート制限・一時障害"
      mitigation: "market-data-collector のリトライ機能を活用。それでも失敗する場合はログに記録し報告"
    - risk: "丹青社の開示書類フォーマットが既存パーサーに非対応"
      mitigation: "parse ステップの quality gate で検出。失敗時はログに記録し、対応策を提案"
