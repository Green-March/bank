  objective: "disclosure-parser の context_priority() 関数に回帰テストを追加し、連結/非連結判定の過去バグ再発を防止する"
  priority: high
  due_date: "2026-02-25"

  background: |
    context_priority() は parser.py:264-294 に定義。EDINET有報のXBRLコンテキストIDを
    スコアリングし、連結/非連結・当期/前期の優先度を判定する関数。
    Session 3, 9 で連結/非連結の substring match バグが発生・修正された経緯がある。
    現在 context_priority() に対する直接的なユニットテストは存在しない。
    Reviewer からも回帰テスト追加が指摘されている。

  target_function:
    file: "skills/disclosure-parser/scripts/parser.py"
    function: "context_priority(context_id: str) -> int"
    lines: "264-294"

  existing_tests:
    location: "skills/disclosure-parser/tests/"
    files:
      - "test_parser.py (8 tests)"
      - "test_pdf_parser.py (95 tests)"
    current_context_priority_tests: 0
    total_pass: "98 passed, 5 skipped"

  task_decomposition:
    - task_id: "T1"
      assignee: "junior1"
      description: |
        skills/disclosure-parser/tests/test_context_priority.py を新規作成し、
        context_priority() の回帰テストを実装する。以下のカテゴリを網羅すること：

        1. 基本ケース:
           - "CurrentYearDuration" → score=160 (currentyear +100, current +60)
           - "CurrentQuarterDuration" → score=50 (currentquarter +50)
           - "PriorYearDuration" → score=-80 (prior -80)

        2. 連結/非連結判定（過去バグ再発防止）:
           - "CurrentYearDuration_NonConsolidatedMember" → nonconsolidated で -25（consolidated の +40 は付かない）
           - "CurrentYearDuration_ConsolidatedMember" → consolidated で +40
           - Plain context（Member なし）→ 連結加点なし（elif ガード確認）

        3. 境界ケース:
           - 空文字列 "" → score=0
           - 大文字小文字混在 "CURRENTYEARDURATION" → 正常スコア（.lower() 正常動作確認）
           - "PreviousYearDuration" → previous で -80
           - "CurrentYearDuration_NonConsolidatedMember" が "consolidated" の substring match で
             誤って +40 されないことを明示的にアサート

        4. 複合ケース:
           - "PriorYearDuration_NonConsolidatedMember" → prior -80 + nonconsolidated -25 = -105
           - "CurrentQuarterDuration_ConsolidatedMember" → currentquarter +50 + consolidated +40 = 90

        5. 既存テスト非破壊確認:
           - pytest skills/disclosure-parser/tests/ を実行し全テスト PASS を確認

      output_path: "skills/disclosure-parser/tests/test_context_priority.py"
      priority: high

  quality_criteria:
    - "context_priority() の全分岐パスをカバーすること"
    - "過去バグの再発防止ケース（nonconsolidated substring match）を明示的に含むこと"
    - "既存テスト（test_parser.py, test_pdf_parser.py）が壊れないこと"
    - "pytest 実行で全テスト PASS すること"
    - "テストケース名が日本語コメントまたは英語で意図を明確にすること"

  risk_assessment:
    - risk: "既存テストの破壊"
