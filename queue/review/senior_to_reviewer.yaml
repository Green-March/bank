      request_id: "req_056"
      title: "quality-gate step_type_consistency gates YAML 統合 + カバレッジ100%"
      assigned_to: junior1
      priority: high
      description: |
        ## A. 新規4マッピング (validators.py STEP_TYPE_MAPPINGS)
        既存4: parsed_to_calculator, calculator_to_valuate, raw_to_risk, integrator_output
        新規4: calculator_to_valuate_relative, calculate_to_report, valuate_to_report, valuate_relative_to_report

        ## B. 7エントリを5つの gates YAML に追加（パラメータ確定版）

        ### gates_parse.yaml (1エントリ)
        ```yaml
        - id: step_type_parsed_to_calculator
          type: step_type_consistency
          params:
            mapping_id: parsed_to_calculator
            data_key: period_index
        ```

        ### gates_calculate.yaml (3エントリ)
        検証対象の棲み分け:
        - calculator_to_valuate → metrics_series (valuate入力)
        - calculator_to_valuate_relative → metrics_series (valuate_relative入力)
        - calculate_to_report → latest_snapshot (reporter入力。metrics_seriesは上記2つで検証済みのため、reporterが主に参照するlatest_snapshotを検証)
        ```yaml
        - id: step_type_calculator_to_valuate
          type: step_type_consistency
          params:
            mapping_id: calculator_to_valuate
            file: metrics.json
            data_key: metrics_series

        - id: step_type_calculator_to_valuate_relative
          type: step_type_consistency
          params:
            mapping_id: calculator_to_valuate_relative
            file: metrics.json
            data_key: metrics_series

        - id: step_type_calculate_to_report
          type: step_type_consistency
          params:
            mapping_id: calculate_to_report
            file: metrics.json
            data_key: latest_snapshot
        ```

        ### gates_integrate.yaml (1エントリ)
        data_key: annual で年次配列内の bs/pl/cf 数値型を検証。
        四半期データ (quarterly) は将来の拡張として別ゲート化可能。
        ```yaml
        - id: step_type_integrator_output
          type: step_type_consistency
          params:
            mapping_id: integrator_output
            file: integrated_financials.json
            data_key: annual
        ```

        ### gates_valuation.yaml (1エントリ)
        ```yaml
        - id: step_type_valuate_to_report
          type: step_type_consistency
          params:
            mapping_id: valuate_to_report
            file: dcf.json
        ```

        ### gates_valuation_relative.yaml (1エントリ)
        ```yaml
        - id: step_type_valuate_relative_to_report
          type: step_type_consistency
          params:
            mapping_id: valuate_relative_to_report
            file: relative.json
        ```

        ## C. 対象外 gates YAML (7ファイル、理由は rev2 と同一)

        ## D. テスト
        - 新規4マッピング単体テスト (≈ 12-16件)
        - gates YAML発火統合テスト (≈ 3-5件)
        - latest_snapshot が dict の場合の step_type_consistency 動作テスト
      output_path: "skills/quality-gate/"
      quality_criteria:
