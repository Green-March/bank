plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "plan_20260225_005_008"
  request_id: "plan_20260225_005_008"
  timestamp: "2026-02-25T14:30:00+09:00"
  objective: "4件の依頼を計画的に実行: (1) disclosure-parser build_period_index calculated_fields伝播修正, (2) レポートリセット自動化ガードスクリプト作成, (3) inventory-builder異常入力テスト追加, (4) comparable-analyzerスキル新規作成"
  parent_cmd: "req_20260225_005, req_20260225_006, req_20260225_007, req_20260225_008"

  task_decomposition:
    round_1_parallel:
      description: "3件の独立タスクを3名のJuniorに並列割り当て"
      tasks:
        - task_id: "T1-req005"
          assign_to: junior1
          request_id: "req_20260225_005"
          title: "period_index calculated_fields 伝播修正"
          description: |
            disclosure-parser の build_period_index() 関数（parser.py:547-578）が
            PeriodFinancial._calculated_fields メタデータを出力に伝播していない問題を修正する。
            修正箇所:
            1. build_period_index() の period entry 初期化時に "calculated_fields": set() を追加
            2. _merge_statement() またはマージループ内で各 PeriodFinancial の _calculated_fields を
               集約して merged dict に反映する
            3. 回帰テスト追加: build_period_index() の出力に calculated_fields が含まれることを検証
            4. 既存テスト121件が全PASS維持であること (pytest skills/disclosure-parser/tests/)
          output_path: "skills/disclosure-parser/scripts/parser.py"
          priority: high
          acceptance_criteria:
            - "build_period_index() 出力の各period dictに calculated_fields キーが存在する"
            - "calculated_fields は元の PeriodFinancial._calculated_fields の和集合である"
            - "calculated_fields が空の場合はキーを省略可（to_dict()と同じ挙動）"
            - "既存テスト121件が全PASS"
            - "回帰テスト1件以上追加"

        - task_id: "T2-req006"
          assign_to: junior2
          request_id: "req_20260225_006"
          title: "レポートリセット自動化ガードスクリプト作成"
          description: |
            templates/senior_reset_report.sh を新規作成する。
            Senior がタスク割り当て前に呼ぶだけで queue/reports/junior{N}_report.yaml を
            idle 状態にリセットするスクリプト。
            設計要件:
            1. 引数: junior番号 (1-3)
            2. バリデーション: 番号が1-3の範囲外ならエラー終了 (exit 2)
            3. リセットテンプレート: go.sh 行166-176と同一
               worker_id: junior{N}, task_id: null, ticker: null, analysis_type: null,
               timestamp: "", status: idle, result: null, quality_check_required: true
            4. アトミック書き込み (tmp + mv) + cleanup trap
            5. 既存テンプレート (senior_clear_junior.sh, reviewer_finalize.sh) と同等のエラーハンドリング
            6. CLAUDE.md の「Report reset rule (mandatory)」セクションに本スクリプトの使用方法を追記
          output_path: "templates/senior_reset_report.sh"
          priority: medium
          acceptance_criteria:
            - "templates/senior_reset_report.sh が存在し実行可能"
            - "引数1で junior1, 引数2で junior2, 引数3で junior3 のレポートをリセット"
            - "リセット後の YAML が go.sh テンプレートと完全一致"
            - "範囲外引数でexit 2"
            - "アトミック書き込み (tmp+mv)"

        - task_id: "T3-req007"
          assign_to: junior3
          request_id: "req_20260225_007"
          title: "inventory-builder manifest 型異常入力テスト追加"
          description: |
            skills/inventory-builder/tests/test_builder.py にマニフェスト型異常テストを追加する。
            調査により以下の未テストケースを特定:
            1. manifest.json が null → JSONDecodeError でスキップされるが明示テストなし
            2. manifest.json が dict でない (文字列, 配列, 整数) → .get() で AttributeError (未捕捉)
            3. results が null → data.get("results", []) で [] になる (safe) が明示テストなし
            4. results が配列でない (文字列, 整数, dict) → for ループで TypeError (未捕捉)
            5. results[i] が dict でない → .get("doc_id") で AttributeError (未捕捉)
            6. manifest が配列 [{...}] → .get() で AttributeError (未捕捉)
            テスト追加と共に、builder.py の _load_all_manifests() に必要な型チェックを追加して
            適切なエラーメッセージまたはフォールバック動作（スキップ + stderr 警告）を実装する。
            既存テストが全PASS維持であること。
          output_path: "skills/inventory-builder/tests/test_builder.py"
          priority: medium
          acceptance_criteria:
            - "上記6パターンの型異常入力テストが全て追加されている"
            - "各異常入力で適切なエラーハンドリング（スキップ+警告 or InventoryBuildError）"
            - "既存テスト全PASS維持"
            - "テスト名が test_manifest_* パターンで一貫している"

    round_2:
      description: "Round 1完了後、最も負荷の低いJuniorに割り当て"
      tasks:
        - task_id: "T4-req008"
          assign_to: "Round 1で最初に完了したJunior"
          request_id: "req_20260225_008"
          title: "comparable-analyzer スキル新規作成"
          description: |
            skills/comparable-analyzer/ に新規スキルを作成する。
            業種コードから比較企業群を自動選定し、財務指標ベンチマーク比較を行う。
            構成:
            - SKILL.md: スキル仕様書
            - scripts/__init__.py
            - scripts/main.py: CLI エントリポイント (argparse, --ticker XXXX)
            - scripts/analyzer.py: コアロジック
              - EDINET CSV (data/.ticker_cache/EdinetcodeDlInfo.csv) の「提出者業種」列から業種コード取得
              - 同一業種の企業を自動選定（最大10社）
              - financial-calculator の FinancialRecord / metrics.json から指標取得
              - 比較マトリクス生成 (ROE, ROA, margin, growth)
              - 四分位ランキング算出
            - tests/__init__.py
            - tests/test_analyzer.py: ユニットテスト
            依存スキル: ticker-resolver (銘柄解決), financial-calculator (指標計算)
            CLI: python3 skills/comparable-analyzer/scripts/main.py --ticker XXXX
          output_path: "skills/comparable-analyzer/"
          priority: medium
          acceptance_criteria:
            - "SKILL.md が存在し、既存スキルと同等の記述品質"
            - "python3 skills/comparable-analyzer/scripts/main.py --help が動作"
            - "analyzer.py が EDINET CSV から業種コードを取得し同業他社を選定"
            - "比較マトリクス (ROE/ROA/margin/growth) を JSON 出力"
            - "ユニットテストが存在し PASS"
            - "既存スキルとの import 連携が正常"

  quality_criteria:
    - "各タスクの既存テストが全PASS維持"
    - "新規テストは命名規則に従い、テスト対象が明確"
    - "新規スキルは既存スキルの構造パターンに準拠"
    - "シェルスクリプトは set -euo pipefail + アトミック書き込み"

  risk_assessment:
    - risk: "req_005 の修正が既存テストを破壊する可能性"
      mitigation: "修正後に pytest 全件実行を必須とする"
    - risk: "req_007 の型チェック追加が既存動作を変更する可能性"
      mitigation: "新規の型チェックは graceful degradation (スキップ+警告) 方針"
    - risk: "req_008 が EDINET CSV の業種列に依存するが、CSV フォーマット変更の可能性"
      mitigation: "列名のフォールバック検索を実装し、見つからない場合は明示エラー"

  scheduling:
    strategy: "Round 1 並列 + Round 2 逐次"
    round_1: "junior1=T1-req005, junior2=T2-req006, junior3=T3-req007 (並列)"
    round_2: "最初に完了したJuniorにT4-req008を割り当て"
    rationale: "T1/T2/T3は完全に独立。T4は最大規模だが他タスクとの依存なし"
