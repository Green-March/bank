plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "plan_20260226_session30_v2"
  timestamp: "2026-02-26T00:15:00+09:00"
  status: pending
  revision_note: "Reviewer指摘3点を反映: Round2担当明示、req_030回帰条件追加、テストカバレッジ計測範囲明示"

  overview: |
    Manager から5件のリクエスト(req_029〜033)を受領。
    スキル強化2件(medium)、スキル新規作成2件(low)、データ拡充1件(low)。
    3名のJuniorで2ラウンドに分けて並列実行する。
    各Juniorは最大2タスク（Round1 + Round2で1件ずつ）。

  task_decomposition:
    round_1:
      description: "medium優先度2件 + 重量タスク1件を3 Junior並列実行"
      tasks:
        - task_id: "task_029"
          request_id: "req_20260225_029"
          assigned_to: junior1
          description: |
            ticker-resolver スキルの双方向解決を強化する。
            現状: ticker→(edinet_code, company_name, fye_month)の正引きのみ。
            追加: edinet_code→ticker、company_name→ticker の逆引き機能。
          scope:
            - "skills/ticker-resolver/scripts/resolver.py に逆引きメソッド追加 (resolve_by_edinet_code, resolve_by_company_name)"
            - "skills/ticker-resolver/scripts/main.py に逆引きCLIサブコマンド追加"
            - "skills/ticker-resolver/tests/ に逆引きテスト追加"
          acceptance_criteria:
            - "既存テスト全パス (pytest skills/ticker-resolver/tests/)"
            - "edinet_code→ticker の逆引きが動作"
            - "company_name→ticker の逆引きが動作（部分一致対応）"
            - "既存の resolve/update/list サブコマンドが変更なく動作（回帰確認）"
          estimated_weight: medium

        - task_id: "task_030"
          request_id: "req_20260225_030"
          assigned_to: junior2
          description: |
            quality-gate 関連の QA bypass 問題を修正する。
            現状: pipeline-runner/references/example_pipeline.yaml の全ステップで gates: null。
            これにより本番でも QA チェックが一切走らない状態。
            修正: 適切な gate 設定を追加し、QA が必ず実行されるようにする。
          scope:
            - "skills/pipeline-runner/references/example_pipeline.yaml の gates: null を適切なgate設定に変更"
            - "skills/quality-gate/references/default_gates.yaml をパイプラインステップに対応させる"
            - "skills/pipeline-runner/ のコードで gates: null 時の動作を確認・修正"
            - "関連テスト追加・修正"
          step_by_step_expectations:
            - step: parse
              gate: "key_coverage + null_rate — パース後のfinancials.jsonにBS/PL/CF主要キーが揃っていること"
              regression: "既存のparse済みデータ（data/7203等）でgate PASSすること"
            - step: integrate
              gate: "file_exists + json_schema — integrated_financials.json が存在し必須キーを含むこと"
              regression: "既存のintegrate済みデータでgate PASSすること"
            - step: calculate
              gate: "file_exists + value_range — metrics.json が存在し、ROE/ROA等が妥当な値域にあること"
              regression: "既存のmetrics.jsonでgate PASSすること"
            - step: "resolve, collect, collect_jquants, inventory, report"
              gate: "file_exists — 各ステップの出力ファイルが存在すること（最低限）"
              regression: "既存データで検証可能なステップはPASS確認"
          regression_conditions:
            - "修正前にpytest skills/quality-gate/tests/ と pytest skills/pipeline-runner/tests/ を実行し、全パスを確認"
            - "修正後も同テストが全パス"
            - "既存データ(data/7203, data/6758, data/9743)に対してexample_pipeline.yamlのgate設定でquality-gateを実行し、全PASSすること"
            - "gates: null を gates設定ありに変更した場合、pipeline-runnerのステップ実行ロジックがgate結果を正しくハンドリングすること"
          acceptance_criteria:
            - "example_pipeline.yaml の全ステップに適切なgates設定あり（gates: null が残らない）"
            - "pipeline-runnerがgate失敗時に適切にエラーハンドリングすること"
            - "既存テスト全パス"
            - "上記regression_conditionsをすべて満たすこと"
          estimated_weight: medium

        - task_id: "task_031"
          request_id: "req_20260225_031"
          assigned_to: junior3
          description: |
            valuation-calculator スキルを新規作成する。
            DCF（割引キャッシュフロー）と相対バリュエーション（PER/PBR/EV-EBITDA同業比較）を計算。
          scope:
            - "skills/valuation-calculator/SKILL.md 作成"
            - "skills/valuation-calculator/scripts/main.py (CLI)"
            - "skills/valuation-calculator/scripts/valuation.py (計算ロジック)"
            - "skills/valuation-calculator/references/ (デフォルトパラメータYAML)"
            - "skills/valuation-calculator/tests/test_valuation.py テスト"
          acceptance_criteria:
            - "DCF計算: WACC、ターミナルバリュー、FCFベース"
            - "相対バリュエーション: PER/PBR/EV-EBITDA"
            - "financial-calculator の metrics.json を入力として受け取れる"
            - "JSON出力"
          test_coverage:
            target: "80% 以上"
            scope: "skills/valuation-calculator/scripts/valuation.py"
            measurement: "pytest --cov=skills/valuation-calculator/scripts --cov-report=term-missing skills/valuation-calculator/tests/"
            minimum_cases:
              - "DCF正常計算（FCF系列あり）"
              - "DCF入力不足時のエラーハンドリング"
              - "PER/PBR/EV-EBITDA正常計算"
              - "同業比較（複数銘柄入力）"
              - "financial-calculator metrics.json 読み込み"
              - "エッジケース（ゼロ除算、負のFCF等）"
          input_format: |
            financial-calculator の metrics.json:
            {ticker, metrics_series: [{fiscal_year, revenue, operating_income, net_income,
             roe_percent, roa_percent, operating_margin_percent, operating_cf, free_cash_flow, ...}],
             latest_snapshot: {...}}
          estimated_weight: heavy

    round_2:
      description: "Round 1完了のJuniorから順に割り当て。担当を事前指定する。"
      tasks:
        - task_id: "task_032"
          request_id: "req_20260225_032"
          assigned_to: junior1
          rationale: "junior1のRound1タスク(req_029)はmedium weightで最も早く完了見込み"
          description: |
            risk-analyzer スキルを新規作成する。
            有価証券報告書の定性テキスト（事業リスク・経営上のリスク）を抽出・分類。
          scope:
            - "skills/risk-analyzer/SKILL.md 作成"
            - "skills/risk-analyzer/scripts/main.py (CLI)"
            - "skills/risk-analyzer/scripts/analyzer.py (リスク抽出・分類ロジック)"
            - "skills/risk-analyzer/tests/test_analyzer.py テスト"
          acceptance_criteria:
            - "リスクカテゴリ: 市場リスク・信用リスク・オペレーショナルリスク・規制リスク・その他"
            - "disclosure-parser出力 or XBRLテキスト要素を入力として利用"
            - "構造化JSON出力"
          test_coverage:
            target: "80% 以上"
            scope: "skills/risk-analyzer/scripts/analyzer.py"
            measurement: "pytest --cov=skills/risk-analyzer/scripts --cov-report=term-missing skills/risk-analyzer/tests/"
            minimum_cases:
              - "リスクテキスト抽出（正常XBRL入力）"
              - "5カテゴリ分類が正しく動作"
              - "入力なし/空テキスト時のエラーハンドリング"
              - "複数リスク項目の構造化出力"
              - "disclosure-parser JSON 読み込み"
          estimated_weight: heavy

        - task_id: "task_033"
          request_id: "req_20260225_033"
          assigned_to: junior2
          rationale: "junior2のRound1タスク(req_030)はmedium weightで2番目に完了見込み"
          description: |
            FY2019ヒストリカルデータ拡充。
            7203トヨタ、6758ソニー、9743丹青社のFY2019データをEDINETから取得し統合。
          scope:
            - "disclosure-collector で FY2019 期間のXBRLデータ取得（EDINET API）"
            - "disclosure-parser で正規化JSON生成"
            - "data/{ticker}/parsed/ に既存データと同一フォーマットで格納"
          acceptance_criteria:
            - "3銘柄すべてのFY2019データ取得完了"
            - "既存FY2020以降データと同一フォーマット"
            - "financials.json に統合済み"
            - "取得期間: FY2019（2019年4月〜2020年3月期）"
          estimated_weight: medium
          network_required: true

  junior_assignment_summary:
    junior1: ["task_029 (Round1)", "task_032 (Round2)"]
    junior2: ["task_030 (Round1)", "task_033 (Round2)"]
    junior3: ["task_031 (Round1)", "Round2なし（Round1がheavy taskのため）"]
    max_per_junior: 2
    load_balance: "junior3はheavyタスク1件のみ。junior1/2はmedium+heavy/mediumの2件。"

  quality_criteria:
    - "全既存テストがパス (pytest 全パス)"
    - "req_031: pytest --cov でvaluation.pyのカバレッジ80%以上"
    - "req_032: pytest --cov でanalyzer.pyのカバレッジ80%以上"
    - "既存スキルの後方互換性維持"
    - "コードスタイル準拠 (black, ruff)"

  risk_assessment:
    - risk: "req_033 の EDINET API アクセスが失敗する可能性"
      mitigation: "リトライロジック活用、期間指定を適切に設定"
    - risk: "req_031 の valuation-calculator が複雑で時間超過"
      mitigation: "DCF と相対バリュエーションを段階的に実装、最低限DCFを優先"
    - risk: "req_030 の gates:null 修正が pipeline-runner の既存動作を壊す"
      mitigation: "修正前に既存テスト全パス確認、段階的にgate追加、既存データで回帰テスト実施"

  parallelization_strategy:
    round_1_parallel: ["task_029 (J1)", "task_030 (J2)", "task_031 (J3)"]
    round_2_assignments: ["task_032 → J1", "task_033 → J2"]
    race_condition_check: "各タスクは独立したスキルディレクトリを操作するため、ファイル競合なし"
