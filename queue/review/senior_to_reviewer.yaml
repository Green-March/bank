plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "plan_s33_001"
  timestamp: "2026-02-26T18:00:00+09:00"
  requests:
    - req_036 (HIGH): pipeline-runner に valuation-calculator / risk-analyzer ステップ統合
    - req_037 (MED): Reviewer instructions にスキーマ整合性チェック観点追加
    - req_038 (LOW): EDINET FY2019 リトライ (9743 丹青社)

  plan_overview: |
    3件の依頼を優先度順に処理する。req_036 と req_037 は独立しており Phase 1 で並列実行。
    req_038 は低優先で Phase 2 で実行。Junior 3名を最大限並列活用する。

  task_decomposition:
    phase_1_parallel:
      - task_id: T1
        request: req_036
        assignee: junior1
        description: |
          pipeline-runner の example_pipeline.yaml に valuation と risk-analysis の2ステップを追加する。
          - valuate ステップ: depends_on=[calculate], valuation-calculator dcf コマンド実行
          - analyze_risk ステップ: depends_on=[calculate], risk-analyzer analyze コマンド実行
          - report ステップの depends_on に valuate と analyze_risk を追加（ダイアモンド依存パターン）
          - SKILL.md のステップ一覧を更新
          - 既存テスト31件が全パスすることを確認
        output_path: skills/pipeline-runner/
        acceptance_criteria:
          - example_pipeline.yaml に valuate, analyze_risk ステップが正しく定義されている
          - report ステップの depends_on が [valuate, analyze_risk, inventory] になっている
          - 既存テスト31件が全パス
          - SKILL.md のステップ一覧が更新されている

      - task_id: T2
        request: req_036
        assignee: junior2
        description: |
          pipeline-runner 統合のための新規テストと quality-gate YAML を作成する。
          - skills/quality-gate/references/ に gates_valuation.yaml を作成
            (valuation 出力の enterprise_value, equity_value, per_share_value の値域チェック)
          - skills/quality-gate/references/ に gates_risk.yaml を作成
            (risk_analysis 出力の total_risks >= 0, by_category 存在チェック)
          - skills/pipeline-runner/tests/ に test_valuation_risk_steps.py を作成
            (新ステップの DAG 検証、依存関係テスト、変数伝搬テスト)
        output_path: skills/quality-gate/references/, skills/pipeline-runner/tests/
        acceptance_criteria:
          - gates_valuation.yaml が valuation-calculator 出力スキーマに適合
          - gates_risk.yaml が risk-analyzer 出力スキーマに適合
          - 新テストが全パス
          - 既存テスト (valuation-calculator 30件, risk-analyzer 44件) が壊れない

      - task_id: T3
        request: req_037
        assignee: junior3
        description: |
          instructions/reviewer.md に Schema Conformance（スキーマ整合性）観点を追加する。
          - 成果物レビュー観点を5観点→6観点に拡張
          - 第1観点として Schema Conformance を追加:
            「出力JSON が下流スキルの入力スキーマ要件を満たし、nested field の型・必須性・
             cross-field dependency が確保されているか」
          - 既存5観点 (data_integrity, source_traceability, analytical_validity,
            clarity, risk_disclosure) は番号2-6として維持
          - 出力テンプレートの comments に schema_conformance フィールドを追加
          - Reviewer の簡潔出力ルール（各1文、suggested_changes 最大2件）は変更しない
          - 各スキル manifest.json の input/output を参照基準として記載
        output_path: instructions/reviewer.md
        acceptance_criteria:
          - Schema Conformance 観点が成果物レビュー観点の第1項目に追加されている
          - 既存5観点が維持されている
          - 出力テンプレートに schema_conformance フィールドがある
          - 簡潔出力ルールが変更されていない

    phase_2_sequential:
      - task_id: T4
        request: req_036
        assignee: junior1 (T1完了後)
        depends_on: [T1, T2]
        description: |
          pipeline-runner 統合の最終検証。
          - 全テスト実行: pipeline-runner (既存31件 + 新規テスト)
          - valuation-calculator テスト確認 (30件)
          - risk-analyzer テスト確認 (44件)
          - スキーマ整合性の確認: financial-calculator 出力 → valuation-calculator 入力の
            フィールド対応 (metrics_series, latest_snapshot の必須フィールド)
        output_path: skills/pipeline-runner/tests/evidence/
        acceptance_criteria:
          - 全テスト (31+新規+30+44) がパス
          - スキーマ整合性に問題がないことを確認

      - task_id: T5
        request: req_038
        assignee: junior3 (T3完了後)
        depends_on: [T3]
        description: |
          EDINET API FY2019 リトライ (9743 丹青社)。
          - Step 1: EDINET API 疎通確認 (curl で documents.json エンドポイント確認)
          - Step 2A (API復旧時): disclosure-collector で FY2019-2022 データ取得
            edinet_code=E00208, start_date=2019-01-01, end_date=2023-02-25
          - Step 2B (API停止継続時): 代替データソースの調査・報告
            - J-Quants API で FY2019 決算短信データ取得可否確認
            - web-researcher で Yahoo/Kabutan/四季報 の過去データ取得可否確認
          - Step 3: 結果をレポートにまとめる
        output_path: data/9743/
        acceptance_criteria:
          - EDINET API 状態が確認されている
          - 取得可能なら FY2019 データが data/9743/raw/edinet/ に保存されている
          - 取得不可なら代替手段の調査結果がレポートされている

  quality_criteria:
    - 既存テスト全パス (pipeline-runner 31, valuation-calculator 30, risk-analyzer 44)
    - 新規テストも全パス
    - スキーマ整合性 — financial-calculator → valuation-calculator のデータフロー検証
    - SKILL.md とコードの一致
    - race condition なし (各 Junior の出力パスが重複しない)

  risk_mitigation:
    - T1 と T2 で同一ファイルを編集しない (T1=example_pipeline.yaml/SKILL.md, T2=tests/+gates/)
    - EDINET API 停止継続のリスク → 代替手段調査を計画に含めている
    - ダイアモンド依存パターン (valuate + analyze_risk → report) は pipeline-runner の既存 DAG 検証で対応済み
