plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "plan_s34_039_041_v2"
  timestamp: "2026-02-27T20:40:00+09:00"
  status: pending
  revision_note: "Reviewer 指摘2点を修正: (1) skill_registry コマンド名を実際のCLIと一致 (2) financial-integrator に --harmonized-dir を追加し harmonize→integrate 経路を確保"

  overview: |
    Manager から3件の依頼 (req_039, req_040, req_041) を受領。
    3名の Junior に1件ずつ並行委任し、最大並列度で処理する。
    【v2 修正】req_039 のスコープを拡大し、financial-integrator 側の
    入力仕様変更を含め、web データが下流評価に反映されるE2Eテストを追加。

  tasks:
    - task_id: "task_039"
      request_id: "req_039"
      assigned_to: junior1
      title: "pipeline-runner に web-researcher / web-data-harmonizer ステップ統合 + financial-integrator 入力拡張"
      description: |
        1. pipeline-runner の skill_registry に web_research / harmonize ステップを追加。
           コマンドは実際のスキルCLIを正確に参照:
           - web_research: "python3 skills/web-researcher/scripts/main.py collect --ticker {ticker} --source all --output data/{ticker}/web_research/research.json"
           - harmonize: "python3 skills/web-data-harmonizer/scripts/main.py harmonize --ticker {ticker} --source all --input data/{ticker}/web_research/research.json --output data/{ticker}/harmonized/harmonized_financials.json"
        2. financial-integrator に --harmonized-dir オプションを追加。
           - integrator.py: harmonized_financials.json をオプショナル第3ソースとして読み込み
           - マージ優先順位: EDINET (primary) → Web (secondary) → J-Quants (tertiary)
           - harmonized_dir 未指定時は既存動作と完全互換
        3. integrate ステップの depends_on を [parse, harmonize] に更新。
        4. example_pipeline.yaml を12ステップ構成に更新。
      pipeline_structure: |
        resolve → {collect_jquants, collect, web_research} (3並列)
                   collect → parse ─────────────────────┐
                   web_research → harmonize ─────────────┤
                                                         ↓
                   integrate (EDINET+Web+JQuants) → calculate
                        ↓
                   {valuate, analyze_risk, inventory} (3並列)
                        ↓
                      report
      deliverables:
        - "skills/pipeline-runner/scripts/pipeline.py: skill_registry に web_research / harmonize 追加（実CLI参照）"
        - "skills/pipeline-runner/references/example_pipeline.yaml: 12ステップ構成に更新"
        - "skills/financial-integrator/scripts/main.py: --harmonized-dir CLIオプション追加"
        - "skills/financial-integrator/scripts/integrator.py: web データ第3ソースマージ実装"
        - "E2Eテスト: web データが integrate → calculate → 下流に反映されることを検証"
        - "既存テスト全パス確認 (pipeline-runner 53件, financial-integrator 既存テスト)"
      acceptance_criteria:
        - "skill_registry コマンドが実際のスキルCLI (main.py collect / main.py harmonize) と一致"
        - "financial-integrator --harmonized-dir 指定時に web データが統合される"
        - "financial-integrator --harmonized-dir 未指定時に既存動作と完全互換"
        - "integrate ステップが parse + harmonize 両方の完了を待ってから実行"
        - "example_pipeline.yaml が DAG 検証を通過"
        - "E2Eテスト: web source データが integrated_financials.json に反映"
        - "既存テスト全パス"

    - task_id: "task_040"
      request_id: "req_040"
      assigned_to: junior2
      title: "financial-reporter に valuation/risk セクション追加"
      description: |
        financial-reporter の render.py に valuation-calculator と risk-analyzer の
        出力データを表示するセクションを追加する。
        データがない場合は graceful degradation でセクションを省略する。
      deliverables:
        - "main.py に --valuation / --risk CLI オプション追加"
        - "render.py に valuation セクション (DCF結果, 感度分析テーブル, PER/PBR/EV-EBITDA比較)"
        - "render.py に risk セクション (5カテゴリ: market/credit/liquidity/operational/regulatory)"
        - "新規テスト追加"
        - "既存テスト全パス確認"
      acceptance_criteria:
        - "valuation データ入力時に DCF/相対バリュエーション セクションが出力される"
        - "risk データ入力時に5カテゴリリスクサマリーが出力される"
        - "valuation/risk データなし時にセクション省略 (graceful degradation)"
        - "既存テスト全パス"
        - "新規テスト追加"

    - task_id: "task_041"
      request_id: "req_041"
      assigned_to: junior3
      title: "Reviewer E2E 検証観点追加"
      description: |
        Reviewer の instructions に E2E (End-to-End) パイプライン検証の
        補足チェックリストを追加する。既存6観点レビューは変更せず、
        E2E 検証は補足的なチェックリストとして追加する。
      deliverables:
        - "instructions/reviewer.md に E2E チェックリスト追加"
        - "templates/reviewer_finalize.sh に --e2e-check オプション追加"
        - "CLAUDE.md の関連セクション同期更新"
      e2e_checklist:
        - "ステップ間データ整合性 (出力スキーマ → 次ステップ入力スキーマ一致)"
        - "欠損伝播 (null/N/A が下流で適切に処理されているか)"
        - "source_attribution 一貫性 (全ステップで出典情報が保持されているか)"
        - "数値精度保持 (丸め・単位変換で精度が失われていないか)"
      acceptance_criteria:
        - "instructions/reviewer.md に E2E セクション追加"
        - "reviewer_finalize.sh --e2e-check オプション動作"
        - "CLAUDE.md との整合性"
        - "既存6観点レビュー体系に変更なし"

  quality_criteria:
    - "全既存テストパス"
    - "新規テスト追加 (各タスクで最低5件)"
    - "既存機能への破壊的変更なし"
    - "CLAUDE.md との整合性維持"

  parallelization:
    strategy: "3 Junior 完全並列"
    junior1: "task_039 (pipeline-runner web統合 + financial-integrator 入力拡張)"
    junior2: "task_040 (financial-reporter valuation/risk)"
    junior3: "task_041 (reviewer E2E)"
    dependencies: "3タスクは独立。並列実行可能。"
