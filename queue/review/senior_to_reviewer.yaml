        2. Edit で孤立ノード検出ロジックを validate_dag() に追加
        3. Read skills/pipeline-runner/tests/test_pipeline.py, テスト追加
        4. pytest skills/pipeline-runner/ で全テスト通過確認
      output_path: "skills/pipeline-runner/scripts/pipeline.py, skills/pipeline-runner/tests/test_pipeline.py"
      priority: "medium"
      baseline: "既存 validate_dag() (pipeline.py:242) — 重複ID/未定義参照/循環参照は実装済み"

