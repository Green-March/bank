plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "plan_req_042_043"
  request_id: "plan_req_042_043"
  timestamp: "2026-02-27T21:10:00+09:00"
  objective: "2件のシステム改善: (1) Reviewer ペインID誤指定の根本対策, (2) pipeline-runner 並列実行最適化"
  context:
    req_042_background: "S34でReviewerがreviewer_finalize.shの--senior-paneに%0(Manager)を誤指定し通知がManagerに届いた。instructions/reviewer.mdにペインID取得方法が未記載。go.shは.claude/runtime/agent-pane-map.tsvにランタイムマッピングを書いているが、テンプレートもinstructionsも参照していない。"
    req_043_background: "pipeline-runnerは12ステップDAGを完全逐次実行。collect_jquants/collect/web_researchは独立だが1つずつ実行。diamond DAG (valuate/analyze_risk/inventory) も同様。concurrent.futuresで並列化すれば実行時間短縮可能。"
  task_decomposition:
    - task_id: "req_042_T1"
      title: "Reviewer ペインID根本対策"
      assignee: "junior1"
      description: |
        以下の4つの改修を実施する:
        1. instructions/reviewer.md に「ペインID確認」セクションを追加
           - agent-pane-map.tsv (.claude/runtime/agent-pane-map.tsv) の参照方法を明記
           - Senior のペインIDは agent-pane-map.tsv で「senior」を検索して取得するルールを明記
           - 使用例の <senior_pane_id> を具体的な取得手順に置き換える
        2. reviewer_finalize.sh に --senior-pane のデフォルト自動取得機能を追加
           - --senior-pane 未指定時に .claude/runtime/agent-pane-map.tsv から senior のペインIDを自動取得
           - agent-pane-map.tsv が存在しない場合はエラー終了（従来通り必須）
           - 取得したペインIDが tmux pane として存在するかバリデーション追加
        3. senior_submit_plan.sh に --reviewer-pane のデフォルト自動取得機能を追加
           - 同様に agent-pane-map.tsv から reviewer のペインIDを自動取得
           - バリデーション追加
        4. instructions/junior.md に「ペインID確認」セクションを追加
           - Senior への send-keys 送信時に agent-pane-map.tsv を参照するルールを明記
      output_path: "instructions/reviewer.md, instructions/junior.md, templates/reviewer_finalize.sh, templates/senior_submit_plan.sh"
      quality_criteria:
        - "reviewer_finalize.sh が --senior-pane 省略時に agent-pane-map.tsv から正しく取得できること"
        - "senior_submit_plan.sh が --reviewer-pane 省略時に agent-pane-map.tsv から正しく取得できること"
        - "agent-pane-map.tsv が存在しない場合に明確なエラーメッセージが出ること"
        - "不正なペインIDを指定した場合にバリデーションエラーが出ること"
        - "instructions/reviewer.md にペインID取得手順が明記されていること"
        - "instructions/junior.md にペインID取得手順が明記されていること"
    - task_id: "req_043_T2"
      title: "pipeline-runner 並列実行最適化"
      assignee: "junior2"
      description: |
        pipeline.py の PipelineRunner.run() メソッドを並列実行対応に改修する:
        1. 逐次実行 (for step in steps) を依存ベーススケジューリングに変更
           - 全依存が完了したステップを concurrent.futures.ThreadPoolExecutor で並列起動
           - max_workers はデフォルト3（collect系3並列に対応）、--max-parallel オプションで変更可能
        2. 並列実行時の失敗伝播
           - 1ステップ失敗 → そのステップに依存する下流ステップを全スキップ
           - 他の独立パスは継続実行（fail-fast ではなくベストエフォート）
           - パイプライン全体のステータスは1つでも失敗があれば "failed"
        3. ログ整合性
           - 並列実行でもステップログが正しく記録される（スレッドセーフ）
           - 各ステップの started_at/completed_at/duration_sec が正確に記録される
        4. output_vars の伝播
           - 依存先ステップの output_vars は、依存元ステップ実行前に確実に解決済みであること
           - 並列ステップ間での variable 競合がないこと（各ステップの output_vars は独立）
        5. Quality gate の実行
           - gate は各ステップ完了直後に同一スレッドで実行（従来通り）
           - gate 失敗時は当該ステップを failed 扱いにして下流をスキップ
        6. ベンチマーク
           - 逐次 vs 並列の所要時間比較をテストで記録
           - 並列実行のログに concurrency_info (同時実行ステップ数) を追加
        7. 既存テスト全パス確認
           - 69テスト全パス + 新規並列テスト追加
      output_path: "skills/pipeline-runner/scripts/pipeline.py, skills/pipeline-runner/tests/"
      quality_criteria:
        - "collect_jquants + collect + web_research が並列実行されること（テストで確認）"
        - "valuate + analyze_risk + inventory が並列実行されること（テストで確認）"
        - "1ステップ失敗時に依存下流のみスキップ、他パスは継続すること"
        - "output_vars が並列実行でも正しく伝播すること"
        - "既存テスト69件が全パスすること"
        - "新規並列テストが追加されていること"
  risk_mitigation:
    - "req_042: agent-pane-map.tsv が存在しない環境（初回起動前）でのフォールバック — 明確なエラーメッセージ + 手動指定への誘導"
    - "req_043: ThreadPoolExecutor の subprocess.run はGILの影響を受けないため並列性能は確保される"
    - "req_043: 既存テストは逐次実行前提のモック — 並列対応のテストを追加して既存テストも維持"
