plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "req_044_plan_002"
  request_id: "req_044"
  timestamp: "2026-02-27T22:15:00+09:00"
  revision: 2
  revision_note: "Reviewer指摘反映: Task3分割(T3a/T3b)、責務分離明確化、concurrency閾値定義"
  objective: "4番目の銘柄（4971 メック）でフルパイプライン12ステップ E2E 検証。S35で導入した並列実行（ThreadPoolExecutor + 依存ベーススケジューラ）の実運用検証を含む。"
  ticker: "4971"
  analysis_type: "full_pipeline_e2e"

  plan_summary: |
    pipeline-runner の12ステップを 4971 メック に対して全実行する。
    並列実行（--max-parallel 3）の実運用検証、失敗伝播（downstream skip）動作確認、最終レポート（md + html）生成を行う。

  dag_structure: |
    resolve
    ├── collect_jquants (並列)
    ├── collect (並列)
    └── web_research (並列)
         ├── parse ← collect
         └── harmonize ← web_research
              └── integrate ← [parse, harmonize]
                   └── calculate
                        ├── valuate (並列)
                        ├── analyze_risk (並列)
                        └── inventory (並列)
                             └── report ← [valuate, analyze_risk, inventory]

  task_decomposition:
    - task_id: "req_044_task_1"
      title: "4971 メック フルパイプライン12ステップ実行"
      assignee: junior1
      priority: high
      parallel_group: "A"
      depends_on: []
      description: |
        pipeline-runner で 4971 メック の12ステップを全実行する。
        コマンド: skills/pipeline-runner/references/example_pipeline.yaml を使用し、ticker=4971, --max-parallel 3 で実行。ログは data/4971/logs/pipeline_run.json に出力。
        検証項目:
          - 12ステップ全て status: completed
          - 全 quality gate pass (gate_result.overall_pass: true)
          - 出力ディレクトリ・ファイルの生成確認（data/4971/ 配下）
        成果物:
          - data/4971/logs/pipeline_run.json
          - data/4971/ 配下の全出力ファイル（resolved, raw, parsed, harmonized, integrated, valuation, risk, reports）
      estimated_duration: "5-10分（EDINET収集が支配的）"
      responsibility: "パイプライン実行と基本成功確認のみ。並列性分析はT3bが担当。"

    - task_id: "req_044_task_2"
      title: "E2E データ品質検証 + レポート品質確認"
      assignee: junior2
      priority: high
      parallel_group: "B"
      depends_on: ["req_044_task_1"]
      description: |
        Task 1 完了後、パイプライン出力の E2E データ整合性を検証する。
        責務: データ品質・レポート品質の検証（並列性検証はT3bが担当）。
        検証項目:
          1. pipeline_run.json: 全12ステップの status が completed であること、duration と gate_result を確認
          2. financials.json: ドキュメント数、期間カバレッジ、BS/PL/CF フィールド充足率
          3. integrated_financials.json: マルチソース統合の source attribution 確認
          4. metrics.json: ROE/ROA/マージン/成長率の算出確認
          5. valuation/dcf.json: DCF・感度分析・マルチプルの妥当性
          6. risk/risk_analysis.json: 5カテゴリリスク評価の完全性
          7. reports/4971_report.md と .html: セクション完全性（概要、指標、推移表、バリュエーション、リスク、データソース）
          8. データソース明記確認（source attribution に EDINET, J-Quants, Web のいずれかが含まれること）
        成果物: 検証結果を report yaml に記載
      responsibility: "データ品質・レポート品質の検証を一元担当。concurrency_info の分析はスコープ外（T3b担当）。"

    - task_id: "req_044_task_3a"
      title: "pipeline-runner テスト実行 + 失敗伝播検証"
      assignee: junior3
      priority: medium
      parallel_group: "A"
      depends_on: []
      description: |
        pipeline-runner の全テスト実行と失敗伝播動作の検証。Task 1 と並列実行可能（独立）。
        実施内容:
          1. pipeline-runner 全テスト実行（83テスト全パス確認）
          2. 失敗伝播テスト結果の確認: test_parallel_execution.py 内の downstream skip テストが pass していることを確認
          3. テスト結果サマリを report yaml に記載
        成果物: テスト結果サマリ（全テスト数、pass/fail、失敗伝播テスト結果）
      responsibility: "テスト実行のみ。実データの分析はスコープ外。"

    - task_id: "req_044_task_3b"
      title: "並列実行 concurrency_info 分析"
      assignee: junior3
      priority: high
      parallel_group: "B"
      depends_on: ["req_044_task_1"]
      description: |
        Task 1 完了後、data/4971/logs/pipeline_run.json の concurrency_info を分析する。
        並列実行検証の唯一の結果所有者。
        検証項目:
          1. concurrency_info キーの存在確認（全12ステップIDがキーとして存在すること）
          2. 並列パス1（resolve直後）: collect_jquants, collect, web_research のうち少なくとも2つの値が >= 2
          3. 並列パス2（calculate直後）: valuate, analyze_risk, inventory のうち少なくとも2つの値が >= 2
          4. 順次ステップ（resolve, integrate, calculate, report）の値が期待通りであること
          5. pipeline_run.json の各ステップ started_at/completed_at から実際の時間重複を確認
        受入条件:
          - concurrency_info 内で max(values) >= 2（少なくとも1箇所で2並列以上が発生）
          - 並列パス1・並列パス2 のそれぞれで concurrent value >= 2 のステップが1つ以上存在
        成果物: concurrency 分析レポート（並列パスごとの実測値、時間重複の有無）を report yaml に記載
      responsibility: "並列実行検証の結果所有者。Task 2 とは責務が分離されている。"

  parallelization_plan: |
    Phase A（並列）: Task 1 (junior1: パイプライン実行) + Task 3a (junior3: テスト実行)
    Phase B（Task 1 完了後）: Task 2 (junior2: E2Eデータ検証) + Task 3b (junior3: concurrency分析)
    ※ junior3 は T3a 完了後、Task 1 の完了を待って T3b に着手する

  responsibility_matrix:
    パイプライン実行: "Task 1 (junior1) — 唯一の実行者"
    データ品質検証: "Task 2 (junior2) — データ整合性・レポート品質の唯一の検証者"
    テスト実行: "Task 3a (junior3) — ユニットテストの唯一の実行者"
    並列性検証: "Task 3b (junior3) — concurrency_info 分析の唯一の結果所有者"

  quality_criteria:
    - "12ステップ全て completed (status: completed)"
    - "concurrency_info: max(values) >= 2（並列実行の証跡）"
    - "concurrency_info 並列パス1: collect_jquants/collect/web_research のうち少なくとも2つで value >= 2"
    - "concurrency_info 並列パス2: valuate/analyze_risk/inventory のうち少なくとも2つで value >= 2"
    - "全 quality gate pass（gates_*.yaml 各ゲート overall_pass: true）"
    - "レポート（md + html）にバリュエーション・リスクセクションあり"
    - "データソース明記（source attribution に EDINET/J-Quants/Web のいずれかを含む）"
    - "pipeline-runner テスト83件全パス"
    - "失敗伝播テストで downstream skip が正しく機能（テスト結果で確認）"

  risks_and_assumptions:
    - risk: "EDINET API のレート制限やタイムアウト"
      mitigation: "disclosure-collector の既存リトライ機構に依存。失敗時は collect ステップで gate_failed となりログに記録される"
    - risk: "4971 メック の XBRL データ構造が既存パーサーと互換性がない"
      mitigation: "disclosure-parser は汎用 XBRL パーサー。互換性問題があれば parse ステップで失敗し、downstream が skip される"
    - risk: "J-Quants API にメックのデータがない"
      mitigation: "collect_jquants は独立パスのため、失敗しても EDINET パスは継続。レポートには利用可能ソースのみ反映"
    - assumption: "4971 は東証上場銘柄であり、EDINET・J-Quants に登録がある"
    - assumption: "example_pipeline.yaml のコマンドテンプレートは 4971 に対しても有効"
