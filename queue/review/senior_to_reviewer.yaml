plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "plan_req_20260225_004"
  request_id: "req_20260225_004"
  timestamp: "2026-02-25T14:00:00+09:00"

  objective: "disclosure-parser の total_liabilities フォールバック計算を実装する。XBRLタクソノミに Liabilities 概念がない銘柄でも total_assets - net_assets で負債合計を自動算出できるようにする。"

  background: |
    現在の parser.py の finalize() には total_assets のフォールバック（current_assets + noncurrent_assets）は実装済みだが、
    total_liabilities のフォールバックが存在しない。
    一部の EDINET 有報（特に IFRS 非対応企業）では TotalLiabilities 概念が XBRL タクソノミに含まれず、
    total_liabilities が null のまま出力される。
    total_assets と net_assets が存在する場合、total_liabilities = total_assets - net_assets で算出可能。

  task_decomposition:
    - task_id: "T004-1"
      title: "total_liabilities フォールバック実装 + メタデータ + 回帰テスト"
      assignee: junior1
      description: |
        1. PeriodFinancial クラスに _calculated_fields: set[str] を追加
        2. finalize() に total_liabilities フォールバックロジックを追加:
           - 条件: total_liabilities is None AND total_assets is not None AND net_assets is not None
           - 計算: total_liabilities = total_assets - net_assets
           - _calculated_fields に "total_liabilities" を追加
        3. 既存の total_assets フォールバック（current_assets + noncurrent_assets）にも
           同様の _calculated_fields トラッキングを追加
        4. to_dict() を更新し、_calculated_fields が空でない場合 "calculated_fields" キーを出力に含める
        5. test_parser.py に回帰テストを追加:
           a. total_liabilities が null で total_assets + net_assets がある場合 → フォールバック発動テスト
           b. total_liabilities が既に存在する場合 → フォールバック不発動テスト
           c. total_assets のみで net_assets がない場合 → フォールバック不発動テスト
           d. calculated_fields メタデータが正しく出力されるテスト
        6. 既存テスト全 PASS を確認（pytest skills/disclosure-parser/tests/ -v）
      output_path: "skills/disclosure-parser/scripts/parser.py, skills/disclosure-parser/tests/test_parser.py"
      priority: high
      estimated_files_changed: 2

    - task_id: "T004-2"
      title: "2780, 7685 実データでのフォールバック動作検証"
      assignee: junior2
      depends_on: "T004-1"
      description: |
        1. T004-1 の実装完了後、2780 の実データで parser を実行:
           python3 skills/disclosure-parser/scripts/main.py --ticker 2780 --output-dir /tmp/verify_2780
        2. 7685 の実データで parser を実行:
           python3 skills/disclosure-parser/scripts/main.py --ticker 7685 --output-dir /tmp/verify_7685
        3. 出力 JSON の financials.json を確認:
           - total_liabilities が null でなくなっている期間があるか
           - calculated_fields に "total_liabilities" が記録されているか
           - total_assets - net_assets の計算が正しいか（手計算と照合）
        4. 検証結果をレポートに記載
      output_path: "/tmp/verify_2780, /tmp/verify_7685"
      priority: high
      estimated_files_changed: 0

  quality_criteria:
    - "既存テスト 7 件（test_parser.py）+ context_priority テスト 13 件（test_context_priority.py）全 PASS"
    - "フォールバック回帰テスト 4 件以上追加、全 PASS"
    - "フォールバック発動時に calculated_fields メタデータが出力される"
    - "total_liabilities が XBRL に存在する場合はフォールバック不発動"
    - "total_assets または net_assets のいずれかが欠損している場合はフォールバック不発動"
    - "2780, 7685 の実データで正常動作を確認"

  risk_assessment:
    - risk: "既存テスト破壊"
      mitigation: "to_dict() の calculated_fields は空の場合省略するため、既存テストの期待値に影響しない"
    - risk: "total_assets 自体がフォールバック計算値の場合の精度"
      mitigation: "finalize() 内で total_assets フォールバックを先に実行し、その後 total_liabilities フォールバックを実行する順序で対応"
