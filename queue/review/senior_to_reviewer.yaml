  revision_note: |
    Reviewer rev4 指摘2点に対応:
    1. T1: subprocess.run(text=True) に統一。result.stdout/stderr は str 型。
       .decode() 呼び出しを全廃し、bytes/str 混在を完全排除。
    2. T2: smoke test に subprocess モックによる最小実行テストを追加。
       validate だけでなく、モック step 実行で output_vars フロー全体を検証。

  overview: |
    req_20260225_017 (高): pipeline-runner output_vars 実装。
    req_20260225_018 (中): market-data-collector 新規作成。

  tasks:
    - task_id: T1
      request_id: req_20260225_017
      junior: junior1
      title: "pipeline-runner output_vars 機能実装 + バリデーション + テスト"
      description: |
        pipeline-runner に output_vars 機能を実装する。
        1. skills/pipeline-runner/scripts/pipeline.py の修正:
           a. PipelineStep に output_vars: dict[str, str] フィールド追加
           b. subprocess.run() の呼び出し方式（★rev5統一）:
              - subprocess.run(cmd, shell=True, text=True, capture_output=True)
              - text=True により result.stdout, result.stderr は str 型
              - .decode() は一切使わない（bytes/str 混在を完全排除）
           c. stderr の処理:
              - キャプチャした result.stderr を即時 sys.stderr.write(result.stderr) で親に転送
              - StepLog.error = result.stderr if result.stderr else f"Step failed with exit code {result.returncode}"
              - str 型で統一、encode/decode 不要
           d. output_vars 処理:
              - json.loads(result.stdout) で解析（str → dict）
              - パース失敗: PipelineError（stdout[:200] 含む）
              - 型チェック: isinstance(data, dict) でなければ PipelineError
              - キー欠損: PipelineError
              - 正常時: str(value) で vars_dict に追加（--vars 既存キーは上書きしない）
           e. 段階的 resolve_vars()
        2. バリデーション:
           a. 全ステップの {placeholder} を正規表現で収集
           b. --vars + output_vars(DAG先行) + prev_output で解決可能性検証
           c. 解決不能時: 明確なエラーメッセージ
        3. ユニットテスト (skills/pipeline-runner/tests/test_output_vars.py):
           a. output_vars ステップ間変数伝搬
           b. --vars オーバーライド優先度
           c. 未解決 placeholder バリデーションエラー
           d. JSON パース失敗
           e. JSON 型チェック（list/int/str → PipelineError）
           f. JSONキー欠損
           g. stderr 転送 + StepLog.error 格納確認（str 型）
           h. stderr 空時 exit-code フォールバック
           i. 既存テスト回帰なし
      depends_on: []

    - task_id: T2
      request_id: req_20260225_017
      junior: junior2
      title: "example_pipeline.yaml + SKILL.md + smoke test（validate + モック実行）"
      description: |
        T1 の output_vars を使い、パイプライン定義・ドキュメント・統合テストを更新。
        1. example_pipeline.yaml 更新:
           step 1 (resolve) に output_vars: {fye_month: fye_month, edinet_code: edinet_code, company_name: company_name}
        2. SKILL.md 更新:
           output_vars 機能説明、エラー仕様、--vars 優先度、バリデーション
        3. Smoke test (skills/pipeline-runner/tests/test_smoke_pipeline.py)（★rev5強化）:
           a. test_validate_example_pipeline:
              example_pipeline.yaml を読み込み、--vars ticker=TEST のみで
              validate（placeholder 解決可能性チェック）が通ることを確認
           b. test_mock_run_example_pipeline（★rev5追加）:
              subprocess.run を unittest.mock.patch でモック化して最小実行テスト:
              - step 1 (resolve) のモック stdout: '{"fye_month": 3, "edinet_code": "E99999", "company_name": "テスト株式会社"}'
              - step 2-7 のモック stdout: '{}'（空 JSON）
              - 全モック step の returncode: 0
              - PipelineRunner.run() を実行し、全7ステップが成功することを検証
              - step 4, 7 のコマンド文字列に fye_month=3 が展開されていることを確認
              - subprocess モックにより実 API 呼び出しなし
        4. YAML 構文チェック + pytest 全 PASS
      depends_on: [T1]

    - task_id: T3
      request_id: req_20260225_018
      junior: junior3
      title: "market-data-collector スキル実装"
      description: |
        J-Quants daily_quotes + listed_info CLIスキル新規作成。
        1. skills/market-data-collector/ (SKILL.md, scripts/__init__.py, main.py, collector.py)
        2. collector.py:
           JQuantsAuth: Path(__file__).resolve().parents[3] → sys.path 追加 → from auth import
           DailyQuotesClient: GET /v1/prices/daily_quotes, pagination_key 対応
           ListedInfoClient: GET /v1/listed/info
        3. main.py: --ticker, --from-date(1年前), --to-date(今日), --output-dir
           出力: market_data.json + listed_info.json, 終了コード 0/1
        4. SKILL.md
      depends_on: []

