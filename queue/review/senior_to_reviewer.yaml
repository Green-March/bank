plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "req_20260228_001_plan_v1"
  request_id: "req_20260228_001"
  timestamp: "2026-02-28T09:00:00+09:00"
  objective: "financial-integrator スキル新規作成 — EDINET financials.json + J-Quants jquants_fins_statements.json → integrated_financials.json を自動生成する汎用CLIスキル"
  background: |
    毎回 Junior がインラインPythonで EDINET + J-Quants データ統合を手動実装している。
    参考実装 data/2780/logs/T3_integrate_edinet_jquants.py を汎用スキル化し、
    全銘柄で1コマンド実行可能にする。
  reference_implementation: "data/2780/logs/T3_integrate_edinet_jquants.py"
  generalization_points:
    - "BASE パス → --ticker + --parsed-dir CLI引数"
    - "FYE_MONTH=3 ハードコード → --fye-month CLI引数"
    - "ANNUAL_DOC_IDS リスト → period_end.month==fye_month AND 期間長≒12ヶ月 で自動分類"
    - "ticker/company_name ハードコード → 引数から自動設定"
    - "J-Quants ファイル欠損時 → EDINET のみで統合（エラーにしない）"
  tasks:
    - task_id: "T1"
      title: "financial-integrator スキル実装"
      assigned_to: "junior1"
      description: |
        skills/financial-integrator/ ディレクトリに新規スキルを作成する。
        1. ディレクトリ構成: scripts/{__init__.py, main.py, integrator.py}, tests/, SKILL.md
        2. integrator.py コアロジック:
           - determine_fiscal_year(period_end, fye_month): FY算出（参考実装の汎用化）
           - determine_quarter(period_end, fye_month): 四半期判定（FYE_MONTHパラメータ化）
           - classify_period(period_end, period_start, fye_month): annual/quarterly 自動分類
             → period_end.month == fye_month AND 期間長 > 300日 → annual, それ以外 → quarterly
           - merge_entry(edinet_entry, jquants_entry): EDINET優先・J-Quants補完マージ（参考実装どおり）
           - integrate(ticker, fye_month, parsed_dir, output_path): メイン統合関数
           - coverage_summary / coverage_matrix 自動生成
           - J-Quants 欠損時の graceful handling（Warning出力、EDINETのみで統合）
        3. main.py CLI:
           - --ticker (必須)
           - --fye-month (必須)
           - --parsed-dir (省略時: data/{ticker}/parsed)
           - --output (省略時: data/{ticker}/parsed/integrated_financials.json)
        4. SKILL.md: 既存スキル（disclosure-parser）と同形式で記述
      output_files:
        - "skills/financial-integrator/scripts/__init__.py"
        - "skills/financial-integrator/scripts/main.py"
        - "skills/financial-integrator/scripts/integrator.py"
        - "skills/financial-integrator/SKILL.md"
      acceptance_criteria:
        - "ANNUAL_DOC_IDS 等の銘柄ハードコードがゼロ"
        - "FYE_MONTH がCLI引数で可変"
        - "J-Quants欠損時にエラーなく動作"
        - "既存スキル（financial-calculator/scripts/main.py）と同一のCLIパターン"
    - task_id: "T2"
      title: "pytest テスト + 2銘柄実データ検証"
      assigned_to: "junior2"
      depends_on: ["T1"]
      description: |
        T1 完了後、テスト作成と実データ検証を行う。
        1. tests/test_integrator.py ユニットテスト:
           - determine_fiscal_year: 3月決算(2780), 12月決算(7685) の両パターン
           - determine_quarter: Q1/Q2/Q3/FY + 非標準月のパターン
           - merge_entry: edinet-only, jquants-only, both, null値処理
           - classify_period: annual/quarterly 自動分類の正確性
        2. tests/test_cli_real_data.py 実データ統合テスト:
           - 2780 (FYE=3月): CLI実行 → 出力JSONの構造・annual/quarterly件数検証
           - 7685 (FYE=12月): CLI実行 → 出力JSONの構造・期数検証
           - J-Quants欠損シミュレーション（tmpdir利用）
        3. pytest 全件PASS確認
      output_files:
        - "skills/financial-integrator/tests/__init__.py"
        - "skills/financial-integrator/tests/test_integrator.py"
        - "skills/financial-integrator/tests/test_cli_real_data.py"
      acceptance_criteria:
        - "ユニットテスト: 3月決算・12月決算の両方で正しいFY/Q判定"
        - "実データテスト: 2780 と 7685 で CLI が正常終了し出力JSONが期待構造"
        - "pytest 全件PASS"
  quality_criteria:
    - "銘柄固有ハードコードがゼロ（grep で ANNUAL_DOC_IDS, 2780, コメ兵 が出ないこと）"
    - "既存スキルと一貫した CLI パターンとディレクトリ構成"
    - "2銘柄（FYE=3月 + FYE=12月）での動作確認済み"
    - "J-Quants 欠損時にも正常動作"
    - "pytest 全テスト PASS"
  execution_order:
    - "T1 → Reviewer承認 → T2 → Reviewer承認 → 完了"
  risk_assessment:
    - risk: "financials.json の document 構造が銘柄間で異なる可能性"
      mitigation: "2780 と 7685 の両方の financials.json を参照して共通構造を確認"
    - risk: "半期報告書の扱い（6ヶ月期間）"
      mitigation: "期間長 > 300日 で annual 判定。半期は quarterly 扱い（参考実装と同じ動作）"
