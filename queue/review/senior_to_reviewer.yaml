plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "plan_s39_001_r5"
  previous_plan_id: "plan_s39_001_r4"
  revision_note: "(1) calculate ステップの DAG依存(integrate) vs 実データ入力(parsed/) の不一致を明文化, (2) Shikiho fallback 時の yahoo 二重収集回避 + result キー契約を定義"
  timestamp: "2026-02-28T12:45:00+09:00"

  objective: "S39 4件一括計画 (r5)"

  pipeline_data_flow_verified:
    description: "example_pipeline.yaml + pipeline.py から検証"
    calculate_step_clarification:
      dag_dependency: "depends_on: [integrate] — integrate 完了後に実行"
      actual_data_input: "--parsed-dir data/{ticker}/parsed — disclosure-parser 出力を読む"
      note: "DAG は実行順序制御のみ。integrate の出力 (integrated/) は calculate に渡らない。integrate が parsed/ を enrichする可能性があるため順序依存が設定されている"

  revision_changes:
    - "req_053: calculate ステップの DAG依存 vs 実データ入力の区別を明文化。型検証は実データ入力パス (parsed/) に対して行う"
    - "req_054: Shikiho fallback 契約を追加: 二重収集回避、result キー、success_count 計算ルール"

  shikiho_fallback_contract:
    trigger: "collect() 内で shikiho の CollectorError catch 時"
    duplicate_avoidance: "fallback 実行前に source_results.get('yahoo', {}).get('collected') を確認。既に yahoo 成功済みなら fallback スキップ（yahoo データ再利用）"
    result_key: "source_results['shikiho'] に fallback 結果を格納。元の shikiho キーを維持し、メタデータで fallback を記録"
    result_metadata:
      collected: true  # fallback 成功時
      fallback_source: "yahoo"
      fallback_reason: "AUTH_ENV_MISSING"  # 条件コード
      original_error: "認証情報が不完全です"
    result_when_yahoo_already_collected:
      collected: true
      fallback_source: "yahoo"
      fallback_reused: true  # 既存 yahoo 結果を再利用
      note: "source_results['yahoo'] のデータをコピーし shikiho キーにも設定"
    success_count_rule: "fallback 成功 or 再利用で collected=true なら success_count に算入。source_count は元の source リスト長 (変更なし)"
    test_scenarios:
      - "shikiho 失敗 + yahoo 未収集 → yahoo fallback 実行 → shikiho.collected=true, shikiho.fallback_source=yahoo"
      - "shikiho 失敗 + yahoo 収集済み → yahoo 再利用 → shikiho.collected=true, shikiho.fallback_reused=true"
      - "shikiho 成功 → fallback なし → shikiho.collected=true, fallback_source なし"
      - "shikiho 失敗 + yahoo fallback も失敗 → shikiho.collected=false, shikiho.fallback_source=yahoo, shikiho.fallback_error=..."

  phase_1_parallel:
    description: "req_052, req_053, req_054 を3名の Junior に並列割り当て"

    req_052_junior1:
      task_id: "T_s39_052"
      assigned_to: junior1
      objective: "financial-calculator の FinancialRecord に入力型 coercion を追加"
      scope:
        - "FinancialRecord.__post_init__ に型強制変換ロジック追加 (frozen dataclass → object.__setattr__)"
        - "対象: revenue, operating_income, net_income, total_assets, equity, operating_cf, investing_cf (float|None) + fiscal_year (int|None)"
        - "string numeric → float/int, 不正値 → None, bool → None"
        - "現行パイプラインでは parsed/ 経由で _to_float 変換済みだが、--input-file 経由の防御的 coercion"
      test_requirements:
        - "string numeric, カンマ区切り, 不正値, bool のテスト"
        - "既存テスト全パス + 新規テスト 10+ cases"

    req_053_junior2:
      task_id: "T_s39_053"
      assigned_to: junior2
      objective: "quality-gate にステップ間型整合性ゲート (step_type_consistency) を追加"
      scope:
        - "新ゲートタイプ 'step_type_consistency' を validators.py に実装"
        - "StepTypeConsistencyResult dataclass 追加"
        - "[修正] 実パイプラインに基づく接続マッピング:"
        - "  (1) parsed→calculator: parsed/*.json の bs/pl/cf 数値 → FinancialRecord float|None"
        - "  (2) calculator→valuate: metrics.json → valuation 入力 float"
        - "  (3) raw→risk-analyzer: raw/edinet → テキスト str"
        - "[修正] calculate ステップは DAG 上 integrate に依存するが、実データは parsed/ から読む。型検証は実データ入力パス (parsed/) に対して実行"
        - "integrator 出力 (integrated/) の型は独立ゲートで検証"
        - "run_all_gates + CLI 統合"
      test_requirements:
        - "型一致/不一致/None パターン + 各接続テスト"
        - "既存テスト全パス + 新規テスト 12+ cases"

    req_054_junior3:
      task_id: "T_s39_054"
      assigned_to: junior3
      objective: "EDINET 公式HP URL + Kabutan 代替 + Shikiho fallback (二重収集回避付き)"
      scope:
        - "homepage.py: EDINET CSV から企業HP URL 抽出強化"
        - "Kabutan 代替調査 (robots.txt 遵守)"
        - "collect() 関数内 Shikiho fallback 実装:"
        - "  (a) CollectorError catch 時 source_name=='shikiho' で発火"
        - "  (b) 二重収集回避: source_results.get('yahoo',{}).get('collected') 確認"
        - "  (c) yahoo 未収集→YahooFinanceCollector で fallback 実行"
        - "  (d) yahoo 収集済み→source_results['yahoo'] データ再利用"
        - "  (e) result を source_results['shikiho'] に格納 (キー維持)"
        - "  (f) メタデータ: fallback_source, fallback_reason, fallback_reused"
        - "  (g) success_count: fallback 成功/再利用で collected=true 算入"
        - "CollectorError に error_code 属性追加"
      test_requirements:
        - "EDINET CSV URL 抽出テスト"
        - "shikiho失敗+yahoo未収集 → yahoo fallback テスト"
        - "shikiho失敗+yahoo収集済み → yahoo 再利用テスト"
        - "shikiho成功 → fallback なしテスト"
        - "shikiho失敗+yahoo fallbackも失敗 → collected=false テスト"
        - "success_count/source_count 正確性テスト"
        - "既存テスト全パス + 新規テスト 12+ cases"

  phase_2_sequential:
    description: "req_052 + req_054 完了後に req_055 を割り当て"

    req_055:
      task_id: "T_s39_055"
      assigned_to: "first_available"
      dependencies: ["req_052", "req_054"]
      objective: "4971 メックで 3ソース統合を実データ検証"
      scope:
        - "Primary: EDINET+J-Quants+Shikiho / Fallback: EDINET+J-Quants+Yahoo"
        - "calculator 入力は parsed/ (DAG は integrate 依存だが実データは parsed/)"
        - "fallback テスト: SHIKIHO env var unset → collect() 自動切替"
        - "Primary vs Fallback 収集率比較 + JSON snapshot"
      test_requirements:
        - "E2E テスト Primary + Fallback"
        - "二重収集回避の実動作確認"
        - "contribution 比率 + 型整合性検証"
        - "テスト 8+ cases"

  risk_assessment:
    - "req_052: 低リスク"
    - "req_053: 低リスク (実パイプライン接続に正確に対応)"
    - "req_054: 中リスク (fallback 契約が明確化され管理可能)"
    - "req_055: 中リスク (Primary/Fallback 両シナリオで再現可能)"
