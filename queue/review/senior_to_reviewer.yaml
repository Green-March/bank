plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "plan_20260225_001_r3"
  request_id: "req_20260225_001"
  revision: 3
  revision_note: "Reviewer指摘対応: (1)FY2025欠損時の中断/継続判断ルール追加、(2)整合チェックの許容誤差・再実行条件を定量化"
  ticker: "7685"
  objective: "7685 BuySell Technologies の四半期データ活用パイプライン（EDINET XBRLパース → J-Quants統合 → レポート再生成）"
  priority: "high"
  due_date: "2026-02-25"

  scope_definition:
    analysis_period: "FY2020-FY2025（全タスク共通）"
    scope_rationale: |
      FY2019 有報は EDINET 保持期限超過により未収集。
      S100L11G（FY2020有報）内のFY2019比較情報は比較参考値のみ。
      全タスクの分析対象期間を FY2020-FY2025 に統一する。
    fy2019_handling: "S100L11G内のFY2019比較情報はパース対象に含むが、レポート分析対象はFY2020-FY2025"

  fy2025_incompleteness_handling:
    current_status: |
      FY2025 本決算（12月期）は2026年2月中旬開示見込み、現時点で未開示。
      取得済み: EDINET H1 (S100WIWT), J-Quants Q1-Q3短信 (3件)。
      未取得: FY2025 Q4/FY通期（有報・決算短信とも未開示）。
    continuation_rule: |
      FY2025 は部分カバレッジ（Q1-Q3/H1まで）として処理を継続する。
      パイプライン中断は行わない。以下の条件を満たせば全タスク継続可能:
      - T1: FY2025 H1 (S100WIWT) が正常にパースできること
      - T2: FY2025 はEDINET H1 + J-Quants Q1-Q3 の統合で部分カバレッジとして処理
      - T3: FY2025通期指標は算出不可。Q1-Q3累計/H1データのみでレポートに明記
    abort_conditions: |
      以下の場合のみパイプラインを中断し、Seniorに報告:
      - FY2020-FY2024 のいずれかの通期データ（有報）がパース不可
      - T1 で document_count が 15件未満（全体の75%未満）
      - T2 で FY2020-FY2024 の年次データに1期以上の完全欠損
    report_disclosure: |
      レポートに以下を必須記載:
      - 「FY2025は Q1-Q3/H1 までの暫定データ。通期確定値は本決算開示後に更新予定」
      - FY2025 の各指標に「暫定」フラグを付与
      - データカバレッジ表に FY2025 FY を「未開示」と明記

  consistency_check_quantitative:
    quarterly_annual_reconciliation:
      target: "四半期累計PL（Q1-Q3累計）と通期PL（有報）の整合性"
      applicable_years: "FY2020-FY2024（FY2025は通期未開示のため対象外）"
      metrics_checked:
        - field: "revenue"
          tolerance_pct: 1.0
          note: "売上高の四半期累計Q1-Q3 vs 有報通期。Q4は差分として算出可能"
        - field: "operating_income"
          tolerance_pct: 2.0
          note: "営業利益。季節性・一時要因で四半期配分に偏りがあるため緩め"
        - field: "net_income"
          tolerance_pct: 3.0
          note: "当期純利益。特別損益・税効果で変動幅が大きいため最も緩い"
      check_logic: |
        各年度について:
        1. Q1-Q3累計の revenue/operating_income/net_income を合算
        2. 通期（有報）の同項目と比較
        3. Q1-Q3累計 ≤ 通期 × (1 + tolerance_pct/100) であること
        4. Q1-Q3累計が通期を超過する場合は異常値としてフラグ
      pass_condition: "FY2020-FY2024 の5年度すべてで上記チェックがパスすること"
      failure_action: |
        1件でも tolerance 超過の場合:
        1. integration_log.json に該当年度・項目・差分率を記録
        2. 差分率 5% 以内: WARNING として記録し処理続行。レポートに注記追加
        3. 差分率 5% 超過: ERROR としてタスク失敗。Senior に報告し原因調査を再委任
    edinet_jquants_crossvalidation:
      target: "FY2023 EDINET vs J-Quants の同一項目比較"
      tolerance_pct: 1.0
      check_logic: |
        FY2023 通期の revenue/operating_income/net_income について:
        - EDINET パース値と J-Quants 値を比較
        - 差分率 = |EDINET - JQuants| / EDINET × 100
      pass_condition: "全項目で差分率 1.0% 以内"
      failure_action: |
        差分率 1.0% 超過:
        1. integration_log.json に差分詳細を記録
        2. 差分率 5% 以内: EDINET を正とし、J-Quants 値を補助値として併記
        3. 差分率 5% 超過: ERROR。連結/単体・会計基準の不一致を調査し Senior に報告
    rerun_conditions: |
      T2/T3 の再実行が必要な条件:
      - T2: ERROR レベルの整合性エラーが1件以上 → 原因特定後に T2 再実行
      - T3: metrics.json で NaN/Infinity が発生 → 入力データ修正後に T3 再実行
      - T3: レポート内の数値がmetrics.jsonと不一致 → T3 再実行

  correction_version_handling:
    policy: "訂正版は常に原本より優先適用する"
    target_corrections:
      - original: "S100PMXQ (FY2022 Q3)"
        correction: "S100Q7YR (訂正四半期報告書)"
      - original: "対応する有報原本"
        correction: "S100NXF7 (訂正有価証券報告書)"
    auto_detection:
      method: "disclosure-parser の既存マージロジックで自動適用を試行"
      verification: "パース後に同一期間の重複 doc_id がないか確認"
    fallback_if_not_implemented:
      trigger: |
        (a) financials.json に PMXQ と Q7YR が両方存在
        (b) 訂正版 doc_id が含まれない
        (c) document_count が 22（訂正統合なし）
      manual_merge_procedure: |
        1. 重複期間を特定し、訂正版の個別JSONで原本を上書き
        2. financials.json を再構築（原本エントリ削除、訂正版のみ保持）
        3. correction_diff.json に差分記録
      diff_verification: "同一 fiscal_year+quarter の重複なし、document_count=20"
      rerun_condition: "schema validation エラーまたはカバレッジ欠落時に T1 再実行"

  tasks:
    - task_id: "T1_edinet_parse"
      title: "EDINET XBRL 全件パース（四半期データ含む）"
      assignee: "junior1"
      dependency: null
      scope: "FY2020-FY2025"
      description: |
        disclosure-parser で data/7685/raw/edinet/ の ZIP 22件を全件パースし、
        四半期データを含む構造化 JSON を生成する。
      command: "python3 skills/disclosure-parser/scripts/main.py --ticker 7685"
      input: "data/7685/raw/edinet/*.zip (22件)"
      output:
        - "data/7685/parsed/{docID}.json"
        - "data/7685/parsed/financials.json (期待 document_count=20)"
        - "data/7685/parsed/correction_diff.json (フォールバック時)"
      acceptance_criteria:
        - "22件の ZIP すべてが処理されること"
        - "訂正版優先適用: 同一期間の重複エントリなし"
        - "document_count = 20（訂正2件が原本を置換）"
        - "FY2020 Q1-Q3, FY2022 Q3 の四半期データが含まれること"
        - "FY2025 H1 (S100WIWT) が正常にパースされていること"
        - "document_count 15件未満の場合はタスク失敗として Senior に報告"

    - task_id: "T2_jquants_integration"
      title: "J-Quants + EDINET 統合データ構築"
      assignee: "junior2"
      dependency: "T1_edinet_parse"
      scope: "FY2020-FY2025"
      description: |
        T1 出力の financials.json と jquants_fins_statements.json を統合。
        FY2020-2022: EDINET のみ、FY2023: クロスバリデーション、FY2024-25: 相互補完。
        FY2025 は Q1-Q3/H1 の部分カバレッジとして処理。
      input:
        - "data/7685/parsed/financials.json"
        - "data/7685/parsed/jquants_fins_statements.json"
      output:
        - "data/7685/parsed/integrated_financials.json"
        - "data/7685/parsed/integration_log.json"
      acceptance_criteria:
        - "FY2020-FY2025 全期間カバー（FY2025はQ1-Q3/H1部分カバレッジ）"
        - "各データポイントにソース帰属（edinet/jquants/both）記録"
        - "FY2023 クロスバリデーション: 差分率 1.0%以内=PASS、5%以内=WARNING+EDINET正、5%超=ERROR→Senior報告"
        - "四半期累計vs通期: revenue±1%, operating_income±2%, net_income±3%以内"
        - "tolerance超過5%以内はWARNING続行、5%超はERROR→Senior報告"
        - "FY2020-FY2024 年次データに完全欠損がある場合はタスク失敗"

    - task_id: "T3_report_regeneration"
      title: "指標計算・レポート再生成（四半期データ含む）"
      assignee: "junior3"
      dependency: "T2_jquants_integration"
      scope: "FY2020-FY2025"
      description: |
        T2 の統合データを入力に指標算出・レポート再生成。
        FY2025は暫定データとしてフラグ付与。
      command_sequence:
        - "python3 skills/financial-calculator/scripts/main.py calculate --ticker 7685 --parsed-dir data/7685/parsed"
        - "python3 skills/financial-reporter/scripts/main.py --ticker 7685 --number-format man_yen"
      input: "data/7685/parsed/integrated_financials.json"
      output:
        - "data/7685/parsed/metrics.json"
        - "data/7685/reports/7685_report.md"
        - "data/7685/reports/7685_report.html"
      acceptance_criteria:
        - "metrics.json に四半期粒度の指標が含まれること"
        - "FY2025 指標に「暫定」フラグが付与されていること"
        - "レポートに「FY2025はQ1-Q3/H1暫定データ」の注記があること"
        - "レポートにデータソース・前提・リスクが明記されていること"
        - "metrics.json に NaN/Infinity がないこと（あればタスク失敗）"

  execution_plan:
    sequence: "T1 → T2 → T3（順序依存、全タスク FY2020-FY2025 スコープ）"
    junior_assignment:
      junior1: "T1 (EDINETパース)"
      junior2: "T2 (統合、T1完了待ち)"
      junior3: "T3 (レポート、T2完了待ち)"

  quality_criteria:
    data_integrity: "訂正版優先適用、重複排除、ソース帰属の完全記録"
    coverage: "FY2020-FY2025（FY2025は部分カバレッジ許容）"
    traceability: "各数値のデータソースが追跡可能"
    consistency: "定量的整合チェック（tolerance定義済み）"
