plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "plan_20260225_s22_batch3"
  timestamp: "2026-02-25T17:00:00+09:00"
  objective: "3件のタスク（req_014〜016）を並列で3名のJuniorに割り当て、品質を担保しつつ完了する"
  
  tasks:
    - task_id: "req_20260225_014"
      title: "example_pipeline.yaml 7ステップ化"
      assignee: junior1
      analysis_type: pipeline_enhancement
      priority: high
      description: |
        現行4ステップ（collect→parse→calculate→report）を7ステップに拡張:
        resolve → collect → parse → integrate → calculate → inventory → report
        
        具体的な作業:
        1. skills/pipeline-runner/references/example_pipeline.yaml を編集
        2. 新ステップ追加:
           - resolve: ticker-resolver (main.py resolve {ticker}) → depends_on: なし、output: data/{ticker}/resolved/
           - integrate: financial-integrator (main.py --ticker {ticker} ...) → depends_on: parse、output: data/{ticker}/integrated/
           - inventory: inventory-builder (main.py --ticker {ticker} ...) → depends_on: calculate、output: data/{ticker}/inventory/
        3. 既存ステップの depends_on を更新:
           - collect: depends_on: [resolve]
           - calculate: depends_on: [integrate] (parse→integrate に変更)
           - report: depends_on: [inventory] (calculate→inventory に変更)
        4. 各ステップの command が対応スキルのエントリポイントと一致することを確認
        5. テスト実行: pytest skills/pipeline-runner/tests/ で全件PASS確認
      output_path: "skills/pipeline-runner/references/example_pipeline.yaml"
      quality_criteria:
        - "7ステップが正しい依存関係で定義されている"
        - "各ステップの command が対応スキルの main.py と一致"
        - "pytest 全件PASS"
        - "pipeline-runner の validate サブコマンドで DAG 検証PASS"

    - task_id: "req_20260225_015"
      title: "financial-reporter 終了コード修正"
      assignee: junior2
      analysis_type: bug_fix
      priority: high
      description: |
        financial-reporter の main.py エントリポイントを修正:
        
        具体的な作業:
        1. skills/financial-reporter/scripts/main.py を編集
        2. 行195付近: `raise SystemExit(main())` → `sys.exit(main())` に変更
        3. `import sys` が既にインポート済みか確認（なければ追加）
        4. 他スキル（disclosure-parser, financial-calculator）と同じパターンに統一
        5. テスト実行: pytest skills/financial-reporter/tests/ で全件PASS確認
        6. 手動確認: python3 skills/financial-reporter/scripts/main.py --help が正常動作すること
      output_path: "skills/financial-reporter/scripts/main.py"
      quality_criteria:
        - "sys.exit(main()) パターンに変更されている"
        - "正常終了時は終了コード0"
        - "エラー時（metrics.json不在等）は非ゼロ終了コード"
        - "pytest 全件PASS"
        - "他スキルと統一されたパターン"

    - task_id: "req_20260225_016"
      title: "comparable-analyzer peer欠損時 graceful degradation"
      assignee: junior3
      analysis_type: bug_fix
      priority: high
      description: |
        comparable-analyzer で peer の metrics.json が不在の場合の graceful degradation を強化:
        
        現状分析:
        - _load_metrics() は既に None を返す（クラッシュはしない）
        - warnings に記録はされるが、missing_peers 専用フィールドがない
        
        具体的な作業:
        1. skills/comparable-analyzer/scripts/analyzer.py を編集
        2. run_analysis() の output 辞書（行281-290付近）に missing_peers フィールドを追加:
           - 型: list[dict] — 各要素: {"ticker": str, "company_name": str, "reason": str}
           - metrics が全て None の peer を missing_peers として記録
        3. missing_peers_count フィールドも追加（int）
        4. 全peer欠損時の挙動を明示的にハンドリング:
           - benchmark_reliable フラグを追加（missing_peers_count < total_peers の場合 true）
           - 全peer欠損時は benchmark_reliable: false を明示
        5. テスト追加（skills/comparable-analyzer/tests/test_analyzer.py）:
           - test_all_peers_missing_metrics: 全peer欠損シナリオ
           - test_partial_peer_missing_with_field: 部分欠損で missing_peers フィールド確認
           - test_missing_peers_count: カウント正確性
        6. 既存テスト実行: pytest skills/comparable-analyzer/tests/ で全件PASS確認
      output_path: "skills/comparable-analyzer/scripts/analyzer.py"
      quality_criteria:
        - "欠損peerがあってもクラッシュしない"
        - "missing_peers フィールドに欠損peer情報が記録される"
        - "missing_peers_count が正確"
        - "全peer欠損時も適切にハンドリング（benchmark_reliable: false）"
        - "新規テスト + 既存テスト全件PASS"

  parallelization:
    strategy: "3タスクは独立しており、junior1/2/3 に1件ずつ並列割り当て"
    dependencies: "タスク間の依存関係なし"
    
  risk_assessment:
    - "req_014: pipeline-runner のテストが example_pipeline.yaml の具体的なステップ数をハードコードしている場合、テスト修正も必要"
    - "req_015: 変更は1行のみで低リスク。ただしテストで終了コードを明示的に検証していることを確認"
    - "req_016: 既存の出力スキーマに新フィールド追加のため後方互換性あり。下流スキルへの影響なし"
