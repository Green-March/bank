plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: "plan_s43_req064_066_rev2"
  timestamp: "2026-03-02T14:15:00+09:00"
  revision: 2
  revision_notes: "Reviewer指摘2点を反映: (1) output_vars永続化設計を先行確定, (2) T2失敗時ロールバック手順追加"
  objective: "3件の依頼を順次実行: (1) pipeline-runner --from-step 部分再実行, (2) 既処理銘柄リグレッション検証, (3) 4971メック E2E"

  tasks:
    - task_id: "T1_from_step"
      request_id: "req_064"
      assignee: "junior1"
      description: "pipeline-runner に --from-step オプションを追加 (output_vars永続化含む)"
      scope:
        - "【永続化設計 (Reviewer指摘1対応)】pipeline_log.json に runtime_vars フィールドを追加。各ステップ完了時に蓄積された output_vars をログに永続化する"
        - "pipeline.py: _run_sequential/_run_parallel 内で runtime_vars を pipeline_log['runtime_vars'] に書き出す"
        - "main.py: argparse に --from-step <step_id> 引数追加"
        - "pipeline.py: PipelineRunner.run() に from_step パラメータ追加"
        - "from_step 自体とその下流 (transitive dependents) のみを実行対象にする"
        - "上流ステップを skipped (reason: from-step) としてマーク"
        - "【output_vars復元の3層優先度】(1) --vars 明示指定 > (2) --log 指定の前回ログの runtime_vars > (3) PipelineError で具体的に不足変数名を表示"
        - "スキップされたステップの output_dir 存在チェック (前提条件バリデーション)"
        - "並列実行 (_run_parallel) との互換性維持"
        - "テスト 10-14件追加 (既存テストに runtime_vars永続化テスト含む)"
      implementation_details:
        output_vars_persistence:
          format: "pipeline_log.json に 'runtime_vars' キーを追加"
          example: |
            {
              "pipeline_name": "...",
              "vars": {"ticker": "2780"},
              "runtime_vars": {"fye_month": "3", "edinet_code": "E03416", "shares_outstanding": "12345678"},
              "steps": [...]
            }
          write_timing: "各ステップの output_vars 処理後に runtime_vars を更新"
          backward_compat: "runtime_vars キーが無い旧ログは空dictとして扱う"
        from_step_var_resolution:
          priority_1: "--vars で指定された値 (最優先)"
          priority_2: "--log で指定された前回ログの runtime_vars"
          priority_3: "PipelineError('--from-step {step} requires variable {var}. Provide via --vars or --log with a previous run log.')"
        from_step_logic:
          step_1: "from_step がパイプライン内に存在するか検証"
          step_2: "from_step の transitive dependents を BFS で算出 (from_step 自身を含む)"
          step_3: "実行対象外ステップを skipped (reason: 'upstream of from-step') としてマーク"
          step_4: "実行対象外ステップの output_dir 存在チェック → 存在しなければ PipelineError"
          step_5: "output_vars を3層優先度で解決"
          step_6: "実行対象ステップのみを _run_sequential or _run_parallel に渡す"
      quality_criteria:
        - "pytest 全テスト PASS (既存 + 新規)"
        - "runtime_vars が pipeline_log.json に正しく永続化されること"
        - "--from-step calculate で valuate/valuate_relative/analyze_risk/inventory/report のみ実行"
        - "--from-step resolve で全ステップ実行 (= from-step なしと同等)"
        - "前回ログから runtime_vars を復元して --from-step が成功すること"
        - "前回ログなし + --vars なしで適切なエラーメッセージが出ること"
        - "無効ステップ名で適切なエラー"

    - task_id: "T2_regression"
      request_id: "req_065"
      assignee: "junior2"
      depends_on: ["T1_from_step"]
      description: "既処理銘柄リグレッション検証スクリプト作成 (ロールバック機能付き)"
      scope:
        - "skills/pipeline-runner/scripts/regression.py 新規作成"
        - "CLI: python3 regression.py --tickers 2780,... --from-step <step> [--pipeline <yaml>] [--report <output.md>] [--dry-run]"
        - "各銘柄: (a) 更新前出力バックアップ, (b) --from-step でパイプライン部分再実行, (c) JSON diff生成"
        - "【Reviewer指摘2対応】失敗時ロールバック: パイプライン失敗時にバックアップから自動復元"
        - "差分レポート (markdown): 銘柄ごとに変更ファイル・フィールド・値の差分"
        - "テスト 5-8件追加"
      implementation_details:
        vars_fallback_procedure:
          step_1: "各銘柄の data/{ticker}/pipeline_log.json の存在を確認"
          step_2: "ログ存在 → --log で runtime_vars を自動供給"
          step_3: "ログ欠損 (2780,7685,9743,4971) → resolve_result.json から edinet_code/fye_month を読み取り --vars に変換"
          step_4: "resolve_result.json も欠損 → 当該銘柄をスキップし、レポートに 'SKIPPED: insufficient data' と記録"
        rollback_procedure:
          backup_location: "/tmp/bank_regression_{ticker}_{timestamp}/"
          backup_scope: "--from-step で再実行されるステップの output_dir のみ"
          trigger: "パイプライン exit code != 0 またはゲート失敗"
          action: "バックアップから output_dir を復元し、レポートに 'ROLLED BACK' と記録"
          cleanup: "全銘柄完了後、成功銘柄のバックアップを削除。失敗銘柄のバックアップは保持"
        dry_run: "--dry-run: 実際のパイプライン実行なしで、バックアップ対象ファイルとvars解決結果を表示"
      quality_criteria:
        - "6銘柄すべてで部分再実行が成功 (またはログ欠損銘柄は適切にスキップ)"
        - "9823 の relative.json PER/PBR/EV-EBITDA non-null"
        - "失敗時にバックアップから正しく復元されること"
        - "差分レポートが生成され変更内容が明確"

    - task_id: "T3_mec_e2e"
      request_id: "req_066"
      assignee: "junior3"
      depends_on: ["T2_regression"]
      description: "4971メック フルパイプライン13ステップ E2E"
      scope:
        - "example_pipeline.yaml で ticker=4971 の13ステップ E2E 実行"
        - "全13ステップ completed、全ゲート PASS 確認"
        - "relative valuation (PER/PBR/EV-EBITDA) 全て non-null 確認"
        - "前回(S39)結果との差分確認・報告"
        - "pipeline_log.json に runtime_vars が正しく永続化されていることも確認 (T1の実地検証)"
      quality_criteria:
        - "13/13 ステップ completed"
        - "13/13 ゲート PASS"
        - "relative valuation: PER, PBR, EV/EBITDA 全て non-null"
        - "DCF 企業価値が算出されていること"
        - "pipeline_log.json に runtime_vars が含まれていること"

  execution_order:
    - phase: 1
      task: "T1_from_step"
      assignee: "junior1"
      note: "output_vars永続化 + --from-step 実装"
    - phase: 2
      task: "T2_regression"
      assignee: "junior2"
      note: "T1完了後。vars自動解決 + ロールバック付きリグレッション検証"
    - phase: 3
      task: "T3_mec_e2e"
      assignee: "junior3"
      note: "T2完了後。runtime_vars永続化の実地検証含むフルE2E"

  risk_assessment:
    - risk: "前回 pipeline_log.json が存在しない銘柄 (4971, 7685, 9743, 2780)"
      mitigation: "resolve_result.json からの vars 自動抽出フォールバック。それも欠損なら SKIPPED 記録"
    - risk: "リグレッション検証中のパイプライン失敗でデータ破損"
      mitigation: "バックアップからの自動ロールバック + 失敗銘柄のバックアップ保持"
    - risk: "既存テスト破壊"
      mitigation: "T1完了時に全既存テストPASS必須"
