plan_review_request:
  request_type: senior_plan_review
  review_type: plan
  plan_scope: senior_master_plan
  plan_id: plan_s37_001
  request_id: req_045_046_047
  timestamp: "2026-02-27T23:00:00+09:00"
  objective: "3件のインフラ・機能開発タスク（PYTHONPATH自動解決、relative valuation追加、go.sh pane-map改善）"

  context:
    session: 37
    prior_findings:
      - "S36: pipeline-runner サブプロセスが skills モジュールを import できない（毎セッション手動 export PYTHONPATH 必要）"
      - "S36: shares_outstanding 未取得により per_share_value が null"
      - "S36: valuation-calculator cmd_relative() は実装済みだがパイプライン定義から呼ばれていない"
      - "S35: agent-pane-map.tsv ベースのペインID管理は稼働中だが go.sh の生成がハードコード変数+スペース区切り"

  tasks:
    # === req_045: Junior1 担当 ===
    - task_id: req_045
      title: "pipeline-runner PYTHONPATH 自動解決"
      assigned_to: junior1
      priority: high
      description: |
        pipeline-runner の _run_step() (pipeline.py:486-524) で subprocess.run() に
        env パラメータが未指定のため、サブプロセスが skills/ モジュールを import できない。
        os.environ.copy() で環境変数を継承し、PYTHONPATH にプロジェクトルートを動的追加する。
      files_to_modify:
        - "skills/pipeline-runner/scripts/pipeline.py (_run_step メソッド、行492-499)"
      implementation:
        - "os.environ.copy() で現在の環境変数を取得"
        - "PYTHONPATH に self.working_dir（プロジェクトルート）を追加（既存パスがあれば先頭に prepend）"
        - "subprocess.run() に env=env を追加"
        - "ハードコードパス禁止 — Path(__file__) や self.working_dir から動的解決"
      acceptance_criteria:
        - "既存テスト 83件が全て pass"
        - "skills/ 配下の全スキルが import 可能であることを確認するテスト追加"
        - "PYTHONPATH が未設定の環境でもサブプロセスが正常動作"
      estimated_scope: "小規模（1ファイル修正 + テスト追加）"

    # === req_046: Junior2 担当 ===
    - task_id: req_046
      title: "relative valuation + shares_outstanding パイプライン統合"
      assigned_to: junior2
      priority: high
      description: |
        (1) J-Quants listed_info API から shares_outstanding を取得し、
            valuation-calculator に --shares オプションとして渡す。
        (2) パイプライン定義に valuate_relative ステップを追加し、
            cmd_relative() を DAG に組み込む。
        (3) report ステップの depends_on に valuate_relative を追加。
      files_to_modify:
        - "skills/pipeline-runner/references/example_pipeline.yaml (ステップ追加)"
        - "skills/disclosure-collector/scripts/main.py or collector.py (shares_outstanding 抽出)"
        - "必要に応じて financial-integrator or 新規変換スクリプト"
      implementation:
        step1_shares_outstanding:
          - "collect_jquants ステップの出力 listed_info.json から shares_outstanding を抽出"
          - "output_vars に shares_outstanding を追加し、後続ステップで {shares_outstanding} として参照可能にする"
          - "J-Quants listed_info API のレスポンスフィールドを確認し、正しいキー名を特定"
        step2_valuate_relative:
          - "example_pipeline.yaml に valuate_relative ステップを追加"
          - "depends_on: [calculate]、calculate と並列実行（diamond パターン維持）"
          - "command: valuation-calculator relative --metrics + --output"
          - "ピアデータなしモード（単体の PER/PBR/EV-EBITDA 算出）で初期実装"
        step3_shares_to_dcf:
          - "valuate ステップの command に --shares {shares_outstanding} を追加"
          - "per_share_value が算出されることを確認"
        step4_report_dependency:
          - "report ステップの depends_on に valuate_relative を追加"
          - "financial-reporter は既に relative.json auto-discover をサポート済み（render.py:222-229）"
        step5_quality_gate:
          - "必要に応じて gates_valuation_relative.yaml を作成"
      acceptance_criteria:
        - "既存12ステップ DAG との整合性維持（既存テスト全パス）"
        - "shares_outstanding が取得され、DCF の per_share_value が非null"
        - "relative.json が生成され、レポートに相対バリュエーションセクション表示"
        - "新規テスト追加"
      estimated_scope: "中規模（パイプライン定義 + 複数スキル連携）"

    # === req_047: Junior3 担当 ===
    - task_id: req_047
      title: "go.sh agent-pane-map.tsv 自動生成改善"
      assigned_to: junior3
      priority: medium
      description: |
        go.sh (行325-335) の agent-pane-map.tsv 生成を改善する。
        現状: ハードコード変数 + スペース区切りの heredoc。
        改善: tmux list-panes + @agent_role ベースの動的生成 + TAB区切り。
      files_to_modify:
        - "go.sh (行325-335 の map 生成部分)"
      implementation:
        - "set_pane() 完了後に tmux list-panes で @agent_role を動的取得し TSV 生成"
        - "TAB 区切りフォーマットに統一（既存 awk 読み取りとの互換性維持）"
        - "生成後にバリデーション: 6行存在、各ロール名が1回ずつ出現することを確認"
        - "バリデーション失敗時はエラーログ出力（起動は継続）"
      acceptance_criteria:
        - "既存の go.sh 起動シーケンスが壊れないこと"
        - "agent-pane-map.tsv が TAB 区切り pane_id<TAB>agent_role フォーマット"
        - "reviewer_finalize.sh・senior_submit_plan.sh の動作に影響なし"
        - "6エージェント全てのマッピングが正しいこと"
      estimated_scope: "小規模（1ファイル修正 + バリデーション追加）"

  parallelization:
    strategy: "3 Junior 並列実行"
    rationale: "3タスクは完全に独立（異なるファイル群を修正）、race condition なし"
    assignment:
      junior1: req_045
      junior2: req_046
      junior3: req_047

  quality_criteria:
    - "全既存テストが pass（regression なし）"
    - "新規テストが追加され pass"
    - "ハードコードパス・マジックナンバーなし"
    - "CLAUDE.md の既存アーキテクチャ記述との整合性"
